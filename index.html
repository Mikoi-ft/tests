<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Клин. медицина — Карточки</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Spectral:wght@400;500;600&display=swap');
:root{--bg:#12100c;--card:#1d1913;--card2:#26211a;--line:#3a3024;--ink:#f2ece0;--mut:#a79b86;--know:#7bc86c;--again:#e0925a;--accent:#d9b25a}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:radial-gradient(1100px 550px at 30% -10%,#241d12 0%,var(--bg) 60%);color:var(--ink);font-family:'Spectral',Georgia,serif;min-height:100vh}
.wrap{max-width:660px;margin:0 auto;padding:18px 16px 96px}
h1{font-family:'Fraunces',serif;font-weight:600;font-size:1.5rem;margin:.2em 0 .1em}
.sub{color:var(--mut);font-size:.92rem;margin-bottom:18px}
.bigbtn{display:block;width:100%;background:linear-gradient(135deg,var(--accent),#b8923f);color:#1a1408;border:none;border-radius:13px;padding:15px;font:inherit;font-weight:600;font-size:1.06rem;cursor:pointer;margin-bottom:10px}
.bigbtn.alt{background:linear-gradient(135deg,#2a231a,#1d1913);color:var(--ink);border:1px solid var(--line)}
.bigbtn:active{transform:scale(.99)}
.lvlbtn{display:flex;justify-content:space-between;align-items:center;width:100%;background:var(--card2);border:1px solid var(--line);color:var(--ink);border-radius:12px;padding:14px 16px;margin-bottom:10px;font:inherit;font-size:1.02rem;cursor:pointer;text-align:left}
.lvlbtn:hover{border-color:var(--accent)}
.lvlbtn .cnt{color:var(--mut);font-size:.85rem;background:#12100c;padding:3px 11px;border-radius:20px}
.meta{display:flex;justify-content:space-between;align-items:center;color:var(--mut);font-size:.85rem;margin-bottom:10px}
.pill{background:var(--card2);border:1px solid var(--line);padding:4px 11px;border-radius:20px}
.bar{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;margin-bottom:18px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--know));width:0;transition:.3s}
.flash{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 20px;min-height:300px;display:flex;flex-direction:column;box-shadow:0 12px 36px rgba(0,0,0,.35);position:relative}
.tag{font-family:'Fraunces',serif;font-size:.76rem;letter-spacing:.04em;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
.qtext{font-size:1.2rem;font-weight:500;line-height:1.5;flex:1}
.hint{color:var(--mut);font-size:.85rem;text-align:center;margin-top:18px;font-style:italic}
.divider{height:1px;background:var(--line);margin:20px 0}
.atext{font-size:1.08rem;line-height:1.55;color:#e9f5e4}
.alabel{font-family:'Fraunces',serif;font-size:.78rem;color:var(--know);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.rate{display:flex;gap:11px;margin-top:16px}
.rate button{flex:1;border:none;border-radius:13px;padding:15px;font:inherit;font-weight:600;font-size:1.02rem;cursor:pointer}
.rate .again{background:rgba(224,146,90,.16);color:var(--again);border:1px solid rgba(224,146,90,.4)}
.rate .know{background:rgba(123,200,108,.16);color:var(--know);border:1px solid rgba(123,200,108,.4)}
.rate button:active{transform:scale(.98)}
.reveal{background:var(--accent);color:#1a1408;border:none;border-radius:13px;padding:15px;font:inherit;font-weight:600;font-size:1.05rem;cursor:pointer;margin-top:16px;width:100%}
.score{font-family:'Fraunces',serif;font-size:3rem;font-weight:600;text-align:center;margin:.2em 0;color:var(--know)}
.scsub{text-align:center;color:var(--mut);margin-bottom:22px}
.foot{position:fixed;bottom:0;left:0;right:0;background:rgba(18,16,12,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:10px 16px;display:flex;justify-content:center}
.foot button{background:none;border:1px solid var(--line);color:var(--mut);border-radius:20px;padding:8px 18px;font:inherit;font-size:.88rem;cursor:pointer}
</style></head>
<body>
<div class="wrap" id="app"></div>
<div class="foot"><button onclick="goHome()">← В меню</button></div>
<script>
const CARDS = [{"q": "Определите, что является принципами поведения медицинского персонала, направленными на повышение качества лечения и устранение вредных последствий?", "a": "Соблюдение профессиональной этики и стандартов медицинской помощи.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, что является бытовыми, профессиональными, социальными, наследственными моментами жизни пациента, которые, не являясь непосредственной причиной болезни при длительном или длительном или постоянном их воздействии, способствуют ее развитию?", "a": "Факторы риска.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какой раздел истории болезни содержит рекомендации врача по режиму, физической активности, диете, дальнейшему приему медикаментозных средств, трудоспособности?", "a": "Заключительный эпикриз (или просто эпикриз).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какой раздел истории болезни содержит заключение врача о заболевании больного, течении болезни, результаты лечения, рекомендации о лечении, приему лекарственных средств, физической нагрузке?", "a": "Заключительный эпикриз.", "level": "ЗАПОМИНАНИЕ"}, {"q": "В каком разделе истории болезни производится графическая регистрация данных измерения температуры, пульса, артериального давления, подсчета частоты дыхания, измерения массы тела, количества выпитой жидкости, суточного количества мочи?", "a": "Температурный лист", "level": "ЗАПОМИНАНИЕ"}, {"q": "В каком разделе истории болезни отражается динамика течения болезни, состояния больного, клинические и произведенные за это время лабораторно-диагностические исследования, консультации других специалистов?", "a": "Дневник врача (или Курация, Кураторские записи).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какой раздел истории болезни включает данные о полученном ранее лечении больным и его эффективности?", "a": "Анамнез morbi (анамнез заболевания).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие данные включает в себя анамнез настоящего заболевания (anamnesis morbi)?", "a": "Анамнез настоящего заболевания включает: дату начала болезни, симптомы, их развитие, лечение и его эффективность.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие данные включает в себя семейный анамнез и данные о наследственности?", "a": "Семейный анамнез включает сведения о заболеваниях близких родственников и наследственных болезнях в семье.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, что из перечисленного относится к объективным методам обследования больного?", "a": "К объективным методам обследования относятся: Осмотр пациента, Пальпация, Перкуссия, Аускультация, Лабораторные и инструментальные исследования.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, что из перечисленного относится к субъективным методам обследования?", "a": "К субъективным методам обследования относятся:", "level": "ЗАПОМИНАНИЕ"}, {"q": "В каком разделе истории болезни отражается то, с чем больной связывает начало заболевания, динамику симптомов?", "a": "Анамнез morbi (анамнез настоящего заболевания).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие данные включают в себя общие сведения о пациенте?", "a": "Общие сведения о пациенте включают: ФИО, возраст, пол, род занятий, адрес проживания.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие условия необходимы для проведения общего осмотра пациента?", "a": "Для проведения общего осмотра необходимы хорошее освещение, удобное положение пациента, отсутствие одежды на обследуемой области, спокойная обстановка.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой признак можно наблюдать при проведении осмотра пациента в норме?", "a": "При осмотре пациента в норме можно наблюдать ровное дыхание, нормальный цвет кожи, отсутствие видимых деформаций и патологий.", "level": "ЗАПОМИНАНИЕ"}, {"q": "В каком положении больного целесообразно проводить осмотр грудной клетки пациента?", "a": "сидя или полусидя.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой метод относится к дополнительным методам обследования больного?", "a": "К дополнительным методам обследования относятся лабораторные и инструментальные методы, например: анализ крови, рентгенография, УЗИ, ЭКГ.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие сведения необходимо узнать у больного при сборе трудового анамнеза?", "a": "При сборе трудового анамнеза необходимо узнать: профессию, условия труда, наличие вредных факторов, продолжительность работы, режим труда и отдыха.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Каким заболеваниям уделяется особое внимание при сборе анамнеза жизни?", "a": "инфекционным, аллергическим, профессиональным, хроническим и наследственным.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какое состояния сознания характерно для здорового человека?", "a": "Для здорового человека характерно ясное сознание, полная ориентация в месте, времени и собственной личности.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Признаками какого состояния сознания являются плохая ориентация больного в окружающей обстановке, вялые и односложные ответы, состояния оцепенения?", "a": "Плохая ориентация, вялые и односложные ответы, оцепенение — признаки оглушения.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, что является основным признаком комы?", "a": "Основной признак комы — полное отсутствие сознания и реакции на внешние раздражители.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие признаки включает положения «ортопноэ» при сердечных заболеваниях?", "a": "При ортопноэ у больных с сердечными заболеваниями характерно затруднённое дыхание в положении лёжа, улучшение в сидячем положении.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой признак характерен для гиперстенического типа конституции?", "a": "Для гиперстенического типа конституции характерна широкая грудная клетка, массивное телосложение, склонность к полноте.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие показатели роста соответствуют среднему росту?", "a": "Средний рост у взрослых мужчин — примерно 170–180 см, у женщин — 160–170 см.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, каким показателям индекса массы тела соответствует ІІ степень ожирения?", "a": "II степень ожирения соответствует индексу массы тела (ИМТ) от 35 до 39,9 кг/м².", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, при развитии какого синдрома будет отмечаться усиление голосового дрожания?", "a": "Усиление голосового дрожания отмечается при синдроме уплотнения легочной ткани (консолидации).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, при каком заболевании может развиться синдром бронхиальной обструкции?", "a": "Синдром бронхиальной обструкции может развиться при бронхиальной астме.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, каким процессом обусловлено спадение стенок альвеол при синдроме уплотнения легочной ткани?", "a": "Спадение стенок альвеол при синдроме уплотнения легочной ткани обусловлено ателектазом.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие патологические шумы будут выслушиваться при аускультации легких больного с синдромом уплотнения легочной ткани?", "a": "При аускультации легких с синдромом уплотнения выслушиваются жёсткое дыхание, крепитация, голосовое дрожание.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие звуки выявляются при аускультации легких больного с синдромом бронхиальной обструкции?", "a": "При синдроме бронхиальной обструкции выявляются свистящие и шумищие дыхательные хрипы.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой симптом характерен для интоксикационного синдрома, развивающегося при синдроме острой респираторной вирусной инфекции (ОРВИ)?", "a": "Для интоксикационного синдрома при ОРВИ характерен симптом лихорадки (повышенная температура тела).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какой симптом может появиться при поражении дыхательной системы при синдроме острой респираторной вирусной инфекции (ОРВИ)?", "a": "При поражении дыхательной системы при ОРВИ может появиться кашель.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какой показатель позволяет определить сравнительная перкуссия легких?", "a": "Показатель сравнительной перкуссии легких — тональность перкуторного звука.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, с помощью какого метода исследования можно определить жизненную емкость легких и составляющих ее объемов воздуха?", "a": "Жизненную емкость легких и её объемы определяют с помощью спирометрии.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Как правильно проводить определение резистентности (эластичности) грудной клетки?", "a": "Определение резистентности грудной клетки проводят с помощью измерения усилий при дыхании и объема воздуха (например, при спирометрии и манометрии).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Как называется метод оценки проведения низкочастотных звуковых колебаний, возникающих при произнесении больным слов, содержащих звук «р» на поверхность грудной клетки?", "a": "Метод оценки голосового дрожания при произнесении звука «р» на поверхность грудной клетки называется пальпаторное голосовое дрожание (трепанация).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Назовите простой метод самооценки и постоянного контроля проходимости бронхов, помогающий измерять объем проходящего воздуха при выдохе в единицу времени?", "a": "Простой метод контроля проходимости бронхов — пикфлоуметрия (измерение пиковой скорости выдоха).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какое свойство верхушечного толчка определяется при осмотре?", "a": "При осмотре верхушечного толчка определяется его локализация, сила и амплитуда.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какой звук определяется в норме над зоной абсолютной сердечной тупости?", "a": "Над зоной абсолютной сердечной тупости в норме определяется звук тоны сердца (I и II).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какие жалобы характерны для больного с синдромом артериальной гипертензии?", "a": "Жалобы при артериальной гипертензии: головная боль, головокружение, шум в ушах, утомляемость.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие значения артериального давления соответствуют ІІІ степени артериальной гипертензии (ВОЗ, 1999)?", "a": "Артериальное давление при III степени гипертензии — ≥180/≥110 мм рт.ст.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие из перечисленных факторов риска могут привести к развитию синдрома вторичной артериальной гипертензии?", "a": "Факторы риска вторичной артериальной гипертензии: заболевания почек, эндокринные нарушения, обструктивное апноэ сна.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, при каком заболевании может возникнуть физиологическая одышка?", "a": "Физиологическая одышка может возникать при физической нагрузке, беременности, вдыхании холодного воздуха.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Каким патогенетическим механизмом обусловлено появление одышки при заболеваниях сердца?", "a": "Появление одышки при заболеваниях сердца обусловлено снижением сердечного выброса и застойными явлениями в легких.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какое заболевание может привести к развитию легочного кровотечения?", "a": "Легочное кровотечение может развиться при туберкулезе легких.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какая жалоба может появится у больного с синдромом дисфагии?", "a": "При синдроме дисфагии больной жалуется на затруднение глотания, ощущение застревания пищи.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, как называется симптом ощущения жжения за грудиной, из эпигастральной области вверх, усиливающееся при наклонах туловища, напряжении мышц брюшного пресса, в положении лежа и после еды?", "a": "Симптом жжения за грудиной называется изжога.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой тип болей характерен для синдрома пептических язв желудка?", "a": "При пептических язвах характерны жгучие, «голодные» боли, усиливающиеся натощак и уменьшающиеся после еды.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие наиболее характерные жалобы будут у больных с гипосекреторным типом желудочной диспепсии?", "a": "При гипосекреторном типе желудочной диспепсии жалобы включают тяжесть и распирание в животе, снижение аппетита, вздутие.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Какие данные могут быть получены при проведении эзофагогастродуоденоскопии больному при рефлюкс-синдроме?", "a": "При эзофагогастродуоденоскопии при рефлюкс-синдроме могут быть обнаружены: воспаление (эзофагит), эрозии, отёк слизистой пищевода, нарушение моторики.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие жалобы больного свидетельствуют о наличии у него рефлюкссиндрома?", "a": "Жалобы при рефлюкс-синдроме: изжога, кислый вкус во рту, отрыжка кислым, боли за грудиной.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой путь заражения характерен для Helicobacter pylori?", "a": "Основной путь заражения Helicobacter pylori — фекально-оральный и орально-оральный.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Назовите, к какому наиболее серьезному осложнению может привести инфицирование Helicobacter pylori?", "a": "Наиболее серьёзное осложнение инфицирования Helicobacter pylori — язвенная болезнь желудка и двенадцатиперстной кишки, а также риск развития рака желудка.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, на какой патологический процесс указывает появление «чаш» Клойбера при обзорной рентгенографии брюшной полости?", "a": "Появление «чаш» Клойбера указывает на кишечную непроходимость.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, с каким процессом связано появление мелены (черного дегтеобразного стула)?", "a": "Мелена связана с кровотечением из верхних отделов желудочно-кишечного тракта.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите основную жалобу больных с синдромом избыточного бактериального роста?", "a": "Основная жалоба при синдроме избыточного бактериального роста — вздутие живота, метеоризм, понос, боли в животе.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какая локализация болей характерна для поражения тонкого кишечника?", "a": "При поражении тонкого кишечника боли локализуются в области пупка или вокруг него.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, с нарушением всасывания каких компонентов при синдроме мальабсорбции наблюдается пастозность нижних конечностей и отеки туловища?", "a": "Пастозность и отеки при синдроме мальабсорбции связаны с нарушением всасывания белков (альбумина).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, при каком синдроме возможно определение в общем анализе кала амилореи, креатореи, стеатореи?", "a": "Амилорея, креаторея, стеаторея обнаруживаются при синдроме внешнесекреторной недостаточности поджелудочной железы.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, наличие каких компонентов в общем анализе кала носит название креаторея?", "a": "Креаторея — наличие в кале мышечных волокон.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, наличие каких компонентов в общем анализе кала носит название амилорея?", "a": "Амилорея — наличие в кале непереваренных остатков крахмала.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Повышение какого лабораторного показателя говорит о развитии синдрома подпеченочной желтухи?", "a": "Повышение конъюгированного (прямого) билирубина говорит о развитии подпеченочной желтухи.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, клиническим признаком какого синдрома является голова медузы?", "a": "Голова медузы — клинический признак портальной гипертензии. Асцит.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой признак выявляется в общем анализе мочи при внепочечной гематурии?", "a": "Признак внепочечной гематурии в общем анализе мочи — свежие эритроциты (неизменённые).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какое название носит состояние, при котором происходит прекращение выделения мочи?", "a": "Прекращение выделения мочи называется анурия.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой фактор может спровоцировать приступ почечной колики при мочекаменной болезни?", "a": "Фактор, провоцирующий приступ почечной колики — тряска, физическая нагрузка, обильное питьё.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой уровень глюкозы в венозной плазме соответствует синдрому гипогликемии?", "a": "уровень глюкозы в венозной плазме < 3,0 ммоль/л.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, передозировка чего из перечисленного является одной из причин возникновения синдрома гипогликемии?", "a": "Передозировка инсулина — частая причина гипогликемии.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой уровень глюкозы в венозной плазме в норме через 2 часа после перорального глюкозотолерантного теста?", "a": "Норма глюкозы через 2 часа после ПГТТ (перорального глюкозотолерантного теста): < 7,8 ммоль/л.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой уровень глюкозы венозной плазмы натощак в норме?", "a": "3,9–5,5 ммоль/л", "level": "ЗАПОМИНАНИЕ"}, {"q": "Назовите, фактором риска развития какого синдрома является ожирение?", "a": "метаболического синдрома", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какому индексу массы тела (кг/м2) соответствует ожирение I степени?", "a": "ИМТ (индекс массы тела) для ожирения I степени: 30,0–34,9 кг/м²", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какое изменение объективного статуса со стороны сердечно-сосудистой системы характерно для синдрома ожирения?", "a": "артериальная гипертензия", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какая окружность талии из перечисленных является нормой для женщин?", "a": "Норма окружности талии для женщин: менее 80 см", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, для какого глазного синдрома при синдроме гиперфункции щитовидной железы характерна гиперпигментация верхних век?", "a": "Глазной симптом с гиперпигментацией верхних век характерен для синдрома Грефе (при гипертиреозе/базедовой болезни)", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, для какого глазного синдрома при синдроме гиперфункции щитовидной железы характерна белая линия склеры между радужкой и верхним веком при взгляде вверх?", "a": "Белая линия склеры между радужкой и верхним веком при взгляде вверх — характерна для симптома Дальримпля.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой объем щитовидной железы (по данным УЗИ) в норме у женщин?", "a": "Норма объёма щитовидной железы по УЗИ у женщин: до 18 мл.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой уровень тиреотропного гормона в норме?", "a": "Нормальный уровень ТТГ (тиреотропного гормона): 0,4–4,0 мкМЕ/мл (может варьироваться немного в зависимости от лаборатории).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, для какого синдрома характерна претибиальная микседема?", "a": "Претибиальная микседема характерна для гипертиреоза (Базедовой болезни).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, для какой формы синдрома гипофункции щитовидной железы характерно повышение уровня тиреотропного гормона и снижение уровня тиреоидных гормонов?", "a": "Повышение ТТГ и снижение Т3/Т4 — характерно для: первичного гипотиреоза.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какое заболевание может стать причиной синдрома вторичного гипотиреоза?", "a": "Причина вторичного гипотиреоза: патология гипофиза (например, опухоль гипофиза, синдром Шихана)", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите характер отеков, развивающихся при синдроме гипотиреоза?", "a": "Отёки при гипотиреозе плотные, пастозные, не оставляющие ямки (слизистые отёки).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, что обозначает термин «моноартикулярные поражения» у больных с суставным синдромом?", "a": "Моноартикулярные поражения — это воспаление одного сустава.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой клинический признак наблюдается при деформации кисти у больных с синдромом дегенеративного поражения суставов?", "a": "При дегенеративных поражениях суставов наблюдается узловатая деформация кистей (узелки Гебердена и Бушара).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, как называется состояние, при котором отсутствует подвижность в суставе за счет костных разрастаний?", "a": "Состояние с отсутствием подвижности в суставе из-за костных разрастаний называется анкилоз.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, как называется пальпаторное ощущение хруста или треска в суставе при движениях?", "a": "Пальпаторное ощущение хруста или треска в суставе называется крепитация.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие изменения помогает выявить измерение окружности сустава?", "a": "Измерение окружности сустава позволяет выявить отёк или гипотрофию мышц.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой орган поражается чаще всего при эпидемическом паротите?", "a": "При эпидемическом паротите чаще всего поражаются околоушные слюнные железы.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какое название носит воспаление слезного мешка?", "a": "Воспаление слёзного мешка называется дакриоцистит.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, воспаление какого органа носит название блефарит?", "a": "Блефарит — это воспаление краёв век.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какое состояние проявляется кратковременным внезапным приступом сильной тревоги, возникающим неожиданно, сопровождающимся одышкой, головокружением, сердцебиением, потливостью?", "a": "Внезапный приступ тревоги с одышкой и сердцебиением — паническая атака.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, чего стараются избегать больные с агарофобией?", "a": "При агарофобии больные избегают открытых пространств и мест скопления людей.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, в каком лечебном учреждений заводится амбулаторная карта пациента?", "a": "Амбулаторная карта заводится в поликлинике.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, в каком разделе истории болезни имеются сведения о занимаемой должности больным?", "a": "Сведения о занимаемой должности указаны в разделе «Анамнез жизни».", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, над каким органом в норме при перкуссии определяется тимпанический звук?", "a": "Тимпанический звук в норме определяется над желудком (область Крайнина).", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие данные можно получить при проведении аускультации сердца?", "a": "При аускультации сердца определяются тоны, шумы, их ритм, сила и частота.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, как называется тип нарушения сознания пациента, при котором он имеет ложные ощущения (зрительные, слуховые, тактильные, обонятельные и др?", "a": ") Нарушение сознания с ложными ощущениями называется галлюциноз.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, при объеме талии более скольки сантиметров можно заподозрить у пациента европейской расы абдоминальный тип ожирения?", "a": "Абдоминальное ожирение можно заподозрить при объёме талии более 94 см у мужчин и более 80 см у женщин.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, при каком значении индекса массы тела говорят о дефиците массы тела (кг/м2)?", "a": "Дефицит массы тела — индекс массы тела менее 18,5 кг/м².", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какая жалоба соответствует интоксикационному синдрому при гриппе/ОРВИ?", "a": "Жалоба при интоксикационном синдроме — озноб, лихорадка, головная боль, ломота в мышцах.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой физико-химический показатель плевральной жидкости говорит о том, что данная жидкость является транссудатом?", "a": "Транссудат отличается низким содержанием белка — менее 25 г/л.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, при каком синдроме возможно появление безболезненных трофических язв на стопе?", "a": "Безболезненные трофические язвы на стопе характерны для диабетической нейропатии.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какой препарат является средством выбора при лихорадке у взрослых пациентов?", "a": "Препаратом выбора при лихорадке у взрослых является парацетамол.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, в каком лечебном учреждений заводится история болезни?", "a": "В стационарном лечебном учреждении.", "level": "ЗАПОМИНАНИЕ"}, {"q": "О поражении какой части дыхательной системы свидетельствует выслушивание крепитации?", "a": "Крепитация свидетельствует о поражении альвеол.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Каким термином называется повышенная воздушность легочной ткани?", "a": "Эмфизема.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Выберите, при каком патологическом синдроме над базальными отделами легких выслушивается крепитация?", "a": "При интерстициальной (очаговой) пневмонии.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Выберите продолжительность прекадиальной боли при синдроме хронической коронарной недостаточности?", "a": "Более 15 минут.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите уровень тиреотропного гормона в норме?", "a": "0,4–4,0 мЕд/л.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Выберите, для какого инфекционного заболевания детского возраста характерны полиморфные высыпания на волосистой коже головы, лица, слизистой рта, туловище, а также обилие пузырьков с прозрачным содержимым?", "a": "Ветряная оспа.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Выберите, при каком заболевании будет выявляться ригидность шейных мышц?", "a": "Менингит.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите какие изменения в механизмах изменчивости вируса гриппа антигенный дрейф?", "a": "Постепенные точечные мутации в генах гемагглютинина и нейраминидазы.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, чем купируется ангиозный приступ при стенокардии в условиях поликлиники?", "a": "Нитроглицерин под язык.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Выберите какую тактику фармацевт выбирает при подозрении на острый инфаркт миокарда?", "a": "Немедленно вызвать скорую помощь.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какие значения артериального давления соответствуют ІІІ степени артериальной гипертензии по (ВОЗ, 1999)?", "a": "≥180/110 мм рт. ст.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите какой симптом будет при одинофагии?", "a": "Боль при глотании.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Определите причину органической дисфагии?", "a": "Стриктуры, опухоли, дивертикулы пищевода.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите для какой патологии характерна выделение большого количества жидкого, зловонного, пенистого кала, 2-3 раза в сутки?", "a": "Синдром мальабсорбции.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите для какого синдрома характерна следующее рентгенологическая картина: мегаколон, долихоколон и чаши Клойберга?", "a": "Кишечная непроходимость.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Определите, какая из этих рекомендаций не подходит для лечения синдрома запоров?", "a": "Назначение препаратов железа.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Опишите что такое асцит?", "a": "Скопление жидкости в брюшной полости.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите в какой цвет окрашивается кожа и слизистые при печеночной желтухе?", "a": "Желто-шафрановый", "level": "ЗАПОМИНАНИЕ"}, {"q": "Опишите что такое ишурия?", "a": "Острая задержка мочеиспускания.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите изменения в биохимическом анализе крови характерные для надпеченочной желтухи?", "a": "Повышение непрямого билирубина.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Назовите, йодирование какого продукта используется в Кыргызстане для массовой профилактики йодного дефицита?", "a": "Поваренной соли.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Укажите, какое мероприятие в первую очередь необходимо выполнить при развитии анафилактического шока?", "a": "Ввести адреналин внутримышечно.", "level": "ЗАПОМИНАНИЕ"}, {"q": "Больная Б., 46 лет, поступила в приемное отделение Городской клинической больницы. С чего должен начать врач расспрос пациентки?", "a": "Врач должен начать расспрос с жалоб пациентки.", "level": "ПОНИМАНИЕ"}, {"q": "На плановом медицинском осмотре у врача-терапевта больной В, 40 лет. Активных жалоб не предъявляет, однако при целенаправленном опросе было выявлено, что больного иногда беспокоит головная боль. При осмотре: удовлетворительное состояние, ясное сознание. Повышенного питания. Кожные покровы влажные, обычного цвета. Тургор кожи сохранен. Что из перечисленного относится к субъективным симптомам?", "a": "Головная боль — это субъективный симптом.", "level": "ПОНИМАНИЕ"}, {"q": "В приемное отделение городской клинической больницы поступил больной С, 50 лет. Больного беспокоят выраженные головные боли, больше в затылочной области, мелькание мушек перед глазами, нечеткое зрение, покалывание пальцев рук. Вышеуказанные жалобы беспокоят в течение двух лет, периодичность – до 2-3 раз в неделю. Во время приступов головной боли принимает по 1т. Аспирина, однако в последнее время без эффекта. Сопутствующие заболевания – хронический простатит. Вредных привычек не имеет. Мать болела гипертонической болезнью, умерла от инсульта в 72 года. Что из собранных данных относится к анамнезу настоящего заболевания?", "a": "К анамнезу настоящего заболевания относятся: выраженные головные боли в затылочной области, мелькание мушек перед глазами, нечеткое зрение, покалывание пальцев рук, периодичность приступов (2–3 раза в неделю), неэффективность аспирина в последнее время.", "level": "ПОНИМАНИЕ"}, {"q": "К врачу-неврологу обратился больной Ж, 19 лет, с жалобами на головные боли, головокружение, шаткость при ходьбе, тошноту, плохой аппетит. Данные жалобы беспокоят в течение двух дней, когда поскользнулся, при падении ударился головой, потерял сознание на 2-3 минуты. При осмотре: состояние больного средней тяжести. Сознание ясное. Положение активное. Больной удовлетворительного питания. Кожные покровы не изменены. Неврологический статус: ориентируется в месте и во времени. Сухожильные рефлексы сохранены. В позе Ромберга не устойчив. Что из перечисленного относится к объективным симптомам?", "a": "Объективные симптомы — это те, которые врач может выявить при осмотре, а не те, что сообщает сам пациент. К объективным симптомам относятся: Состояние средней тяжести, Сознание ясное, Положение активное, Кожные покровы не изменены, Ориентирован в месте и времени, Сухожильные рефлексы сохранены, Неустойчивость в позе Ромберга (ключевой неврологический симптом)", "level": "ПОНИМАНИЕ"}, {"q": "На приеме у участкового терапевта пациент К., 32 года, строитель. Жалуется на одышку, влажный кашель, повышение температуры до 38,00С. При сборе анамнеза: жалобы беспокоят в течение 2х дней. Появление кашля связывает с переохлаждением и тяжелыми условиями труда. Хронические заболевания дыхательных путей отрицает. Не обследовался. Укажите, какие данные из анамнеза настоящего заболевания (anamnesis morbi) также должен уточнить врач?", "a": "Когда именно начались симптомы (точное время), Как развивались симптомы (постепенно или остро), Характер и длительность одышки и кашля, Наличие/отсутствие мокроты, её цвет, запах, количество, Что именно принимал больной (если принимал лекарства), Были ли подобные эпизоды ранее, были ли контакты с больными ОРВИ/гриппом/туберкулёзом, Прививки и хронические болезни в прошлом (особенно по дыхательной системе), Работа в пыли, с вредными веществами и на сквозняках", "level": "ПОНИМАНИЕ"}, {"q": "Больной О, 20 лет, учащийся, поступил в приемное отделение инфекционной больницы с жалобами на недомогание, тошноту, изменение цвета кожных покровов, потемнение мочи. Жалобы беспокоят в течение 3х дней, самостоятельно не лечился. Контакты с инфекционными больными отрицает. При обследовании больного врач записал в истории болезни: кожные покровы желтушные, иктеричность склер. Язык обложен белым налетом. Печень на 4 см ниже левой реберной дуги, уплотнена, чувствительна при пальпации. С помощью какого метода исследования провели оценку кожных покровов?", "a": "Для оценки цвета кожи, иктеричности склер, налёта на языке использовался: Осмотр (инспекция). Это физикальный метод обследования, при котором врач визуально оценивает состояние кожи и слизистых.", "level": "ПОНИМАНИЕ"}, {"q": "Получен анализ больного Г., 46 лет, получающего лечение в отделении терапии: количество 80 мл, цвет соломенно-желтый, прозрачная, УВ 1020, белок 0,06 г/л, глюкоза -, соли -, кетоновые тела -, билирубин -. Микроскопическое исследование: эпителий плоский 20-24 в п/зр, почечный -, переходный -. Лейкоциты 10-14 в п/зр. Эритроциты измененные 1-2 в п/зр, неизмененные -. Цилиндры -. Слизь ++, бактерии +, грибы -. О каком анализе идет речь?", "a": "Это общий анализ мочи (ОАМ)", "level": "ПОНИМАНИЕ"}, {"q": "Получен анализ больного Ж., 37 лет, получающего лечение в терапевтическом отделении: количество 150 г, консистенция кашицеобразная, оформленный, цвет коричневый, запах нерезкий, неприятный, реакция нейтральная, слизь +. Химическое исследование: реакция на скрытую кровь -, стеркобилин ++. Микроскопическое исследование: мышечные волокна ++, соединительная ткань ++, нейтральный жир +, жирные кислоты и мыла +. Крахмал -. Слизь, эпителий -. Лейкоциты единичные. О каком анализе идет речь?", "a": "Общий анализ кала (копрограмма).", "level": "ПОНИМАНИЕ"}, {"q": "Получен анализ больного Д., 40 лет, проходившего амбулаторное исследование в поликлинике. Гемоглобин 140 г/л, эритроциты 4,1х1012/л, ЦП 0,9, ретикулоциты 3%, тромбоциты 190х109/л, лейкоциты 6,0х109/л. Лейкоцитарная формула: нейтрофилы п/я 2%, с/я 63%, эозинофилы 3%, базофилы 1%, лимфоциты 22%, моноциты 9%. СОЭ 8 мм/ч. О каком анализе идет речь?", "a": "Общий анализ крови.", "level": "ПОНИМАНИЕ"}, {"q": "Получен анализ больного Н., 70 лет, проходившего амбулаторное обследование в поликлинике по месту жительства. Количество: 20 мл, цвет желтый, характер гнойный, консистенция вязкая, примеси отсутствуют. Микроскопическое исследование: спирали Куршмана отсутствуют, кристаллы Шарко-Лейдена отсутствуют, Эозинофилы отсутствуют, эластичные волокна +, лейкоциты сплошь, эритроциты 5-6 в п/зр, эпителиальные клетки в большом количестве, альвеолярные клетки +. Бактериологическое исследование: туберкулезные палочки не найдены, кокки +++. О каком анализе идет речь?", "a": "Анализ мокроты.", "level": "ПОНИМАНИЕ"}, {"q": "Больной Ж, 48 лет, обратился к семейному врачу с жалобами на головные боли, шум в ушах, мелькание «мушек» перед глазами. Жалобы появились 1-2 года назад, однако в последнее время беспокоят практически постоянно. Самостоятельно принимает по 1т Аспирина, однако эффект непродолжительный, и заметил появление болей в области желудка. Из анамнеза жизни: в развитии от сверстников не отставал. Образование среднее специальное, работает по специальности – шофер. Женат, двое детей. Проживает в квартире. Питается регулярно, в столовой. В молодости курил в течение 5-6 лет, бросил 15 лет назад. Хронических заболеваний не имеет. У матери была гипертоническая болезнь. Какой фактор риска развития синдрома артериальной гипертензии присутствует у данного больного?", "a": "Наследственность по гипертонической болезни (мать болела ГБ).", "level": "ПОНИМАНИЕ"}, {"q": "Студент 3 курса Фармацевтического факультета медицинского ВУЗа проводил расспрос больной Д., 58 лет, получающей стационарное лечение в отделении пульмонологии городской больницы. Больная сообщила следующее: беспокоит ее одышка, малопродуктивный кашель. Родилась в г.Фрунзе, от сверстников в развитии не отставала. Образование – высшее, в настоящее время на пенсии. Проживает в квартире с мужем. Питается дома, регулярно, разнообразно. Половой анамнез: замужем, трое детей, климакс с 55 лет. Аллергологический анамнез: популяция «В» (на нестероидные противовоспалительные, проявляется удушьем, кашлем). Наследственность: мать, брат аллергики. Вредных привычек не имеет. Какие ошибки совершил студент при проведении расспроса?", "a": "Ошибка: студент не уточнил анамнез настоящего заболевания (время появления и динамика симптомов, лечение и т. д.).", "level": "ПОНИМАНИЕ"}, {"q": "На приеме у участкового терапевта пациент У., 46 лет. Жалуется на одышку, периодический влажный кашель (больше в ночное время), озноб. Жалобы беспокоят в течение 5 дней. Развитие заболевания связывает с появлением ранее таких же симптомов у жены. При исследовании органов дыхания было выявлено: притупление перкутороного звука, патологическое бронхиальное дыхание в базальных отделах правого легкого. Предположите, какой синдром развился у больного?", "a": "Развился синдром — плеврита с экссудативным компонентом (плевральный выпот).", "level": "ПОНИМАНИЕ"}, {"q": "В пульмонологическое отделение Городской Клинической Больницы №1 поступила больная К, 45 лет. Жалобы: одышка, чувство нехватки воздуха, кашель с трудно отделяемой мокротой. При осмотре: положение вынужденное, сидит, упираясь руками о край кровати, эмфизематозная форма грудной клетки, на расстоянии слышны жужжащие и свистящие сухие хрипы. Перкуторно – над обоими легкими коробочный звук. Аускультативно: множество сухих жужжащих и свистящих хрипов. Какие изменения вы ожидаете увидеть на рентгенограмме грудной клетки?", "a": "На рентгенограмме — увеличение прозрачности легочных полей, эмфизема, расширение межреберных промежутков, опущение диафрагмы.", "level": "ПОНИМАНИЕ"}, {"q": "В приемное отделение городской больницы поступила больная А., 50 лет, секретарь. Жалобы на экспираторную одышку, появляющуюся в ночное время. Во время приступа положение вынужденное, садится на кровать и упирается руками об ее край, кашель сопровождается отделением трудно отделяемой мокроты. Заболевание прогрессирует после перенесенного год назад воспаления легких. Объективно: грудная клетка расширена, при аускультации – дыхание ослабленное, рассеянные, свистящие и жужжащие хрипы. Какие признаки могут быть выявлены при проведении топографической перкуссии у данной больной?", "a": "При топографической перкуссии — коробочный звук (гиперрезонанс), укорочение перкуторного звука за счет уплотнения тканей или бронхоспазма.", "level": "ПОНИМАНИЕ"}, {"q": "Общий анализ мокроты больного Д, 38 лет, получающего лечение в отделении пульмонологии: количество – 20,0 мл. Цвет беловатая, прозрачность – мутная, белок 6,7%, удельный вес 1,029. Лейкоциты – большое количество, эритроциты – единичные. Окрашенный мазок: сегменты сплошь, палочки Коха – нет, атипичные клетки – нет. Какой характер имеет мокрота больного Д.?", "a": "Мокрота — воспалительного характера, гнойная (гнойно-воспалительная).", "level": "ПОНИМАНИЕ"}, {"q": "В терапевтическом отделении городской больницы получает лечение больной Э, 71 год. Жаловался на постоянную одышку, непродуктивный кашель. Больному была проведена рентгенография грудной клетки, где было обнаружено затемнение с горизонтальным уровнем жидкости справа. Была проведена плевральная пункция. Какие признаки в анализе плевральной жидкости указывают на невоспалительный выпот (транссудат)?", "a": "Для транссудата характерны: прозрачная плевральная жидкость, низкое содержание белка (<25 г/л), низкая плотность, низкое количество клеток, отсутствие гнойных и воспалительных элементов.", "level": "ПОНИМАНИЕ"}, {"q": "К участковому терапевту на очередной прием пришел больной Б, 50 лет, активных жалоб не предъявляет. Самочувствие хорошее. Вредные привычки: курит по 1 пачке сигарет в день в течение 25 лет, по утрам беспокоит кашель. Сопутствующие заболевания: гипертоническая болезнь, лечение получает. При осмотре отклонений не выявлено. Врачом была проведена пикфлоуметрия, которая дала средний показатель на уровне 480 л/мин (норма 610 для данного больного). О чем говорит полученный показатель?", "a": "Пикфлоуметрия 480 л/мин при норме 610 говорит о умеренном снижении функции внешнего дыхания, возможна хроническая обструктивная болезнь легких (ХОБЛ) или начало нарушения проходимости дыхательных путей.", "level": "ПОНИМАНИЕ"}, {"q": "На приеме у терапевта больной Ш, 29 лет, страдает бронхиальной астмой в течение 15 лет. Жалобы на приступы удушья ночью, 1-2 раза в неделю, купируются ингаляциями Сальбутамола. При осмотре отклонений от нормы не выявлено. Врачом проведена пикфлоуметрия. Показатели: 500 л/мин (норма у данного больного – 620 л/мин). Каким процессом можно объяснить снижение пиковой скорости выдоха у данного больного?", "a": "Снижение пиковой скорости выдоха связано с обструкцией дыхательных путей при бронхиальной астме.", "level": "ПОНИМАНИЕ"}, {"q": "Общий анализ мокроты больного Л, 40 лет: количество 20,0 мл, цвет «белый», консистенция вязкая, характер слизистый. Микроскопическое исследование: спирали Куршмана обнаружены, кристаллы Шарко-Лейдена обнаружены, эозинофилы большое количество, эластические волокна отсутствуют, лейкоциты единичные, эритроциты отсутствуют, эпителиальные клетки единичные, альвеолярные клетки отсутствуют. Бактериологическое исследование: туберкулезные палочки отсутствуют, микроорганизмы не обнаружены. Каким заболеванием страдает больной?", "a": "Больной страдает бронхиальной астмой (наличие спиралей Куршмана, кристаллов Шарко-Лейдена и много эозинофилов — характерно для астмы).", "level": "ПОНИМАНИЕ"}, {"q": "К больной А., 65 лет, была вызвана бригада скорой медицинской помощи. Больная жалуется на резкое ухудшение состояния, выраженные головные боли, тошноту, однократную рвоту, потливость, мелькание мушек перед глазами, шум в ушах. Из анамнеза: у больной повышается давление в течение 10 лет, принимает Амлодипин 10 мг по 1 таблетке вечером. При объективном обследовании: состояние средней тяжести, в сознании. Кожные покровы влажные. Язык влажный, обложен белым налетом. В легких – дыхание везикулярное, хрипов нет. ЧСС 98 в мин. Акцент ІІ тона над аортой. АД 200/120 мм.рт.ст. Со стороны органов ЖКТ патологии не выявлено. Какое состояние можно заподозрить у больной?", "a": "У больной подозревается гипертонический криз с угрозой осложнений (гипертоническая энцефалопатия или угроза инсульта).", "level": "ПОНИМАНИЕ"}, {"q": "В приемное отделение городской больницы направлен больной М, 42 года, главный инженер. Жалуется на сильные боли за грудинной с иррадиацией в левое плечо и лопатку, возникают при быстрой ходьбе, купируются в покое или после приема нитроглицерина. Из анамнеза: боли беспокоят в течение 2 лет. Обратился к врачу, посоветовал принимать нитроглицерин. Настоящее ухудшение состояния около 2 недель, когда участились приступы болей, появилась слабость, раздражительность, плохой сон. Курит в течение 22 лет по 20-30 сигарет в день. Как Вы считаете, какой синдром развился у больного?", "a": "Сильные боли за грудиной при ходьбе, купируются нитроглицерином, участились в последние 2 недели. Стабильная стенокардия напряжения III–IV функционального класса (предынфарктное состояние).", "level": "ПОНИМАНИЕ"}, {"q": "Больной С., 30 лет, обратился к участковому врачу с жалобами на резкие боли в эпигастральной области, возникающие через 1,5 – 2 часа после еды, ночные, голодные, купирующиеся приемом молочной пищи, после применения грелки; а также на кислую отрыжку, изжогу, наклонность к запорам. Как вы считаете, какой орган поражен у больного: Поражение двенадцатиперстной кишки – язвенная болезнь двенадцатиперстной кишки. 307. Больной П., 20 лет, обратился к участковому врачу с жалобами на резкие боли в эпигастральной области, возникающие через 1,5 – 2 часа после еды, ночные, голодные; а также на кислую отрыжку, изжогу. Из анамнеза: студент, питается нерегулярно, часто в сухомятку. Курит по 10 сигарет в день около двух лет. Предположите, какой синдром развился у больного?", "a": "Язвенная болезнь (вероятно, 12-перстной кишки), развивается диспептический и болевой синдром.", "level": "ПОНИМАНИЕ"}, {"q": "308. Больная Д., 45 лет, администратор, обратилась к терапевту с жалобами на резкие боли в эпигастральной области, возникающие через 30 минут - 1 час после еды, купирующиеся приемом молочной пищи; а также на кислую отрыжку, изжогу, наклонность к запорам. Из анамнеза: жалобы беспокоят в течение 6 месяцев, после длительного приема обезболивающих средств. На работе – частые стрессы. Какое обследование нужно назначить больной для подтверждения диагноза?", "a": "Гастроскопия (ЭГДС) – для подтверждения язвы желудка, выявления эрозий, гастрита, Хеликобактер.", "level": "ПОНИМАНИЕ"}, {"q": "В терапевтическое отделение городской больницы госпитализирован больной А, 25 лет, в жалобами на режущие боли в эпигастральной области ночью и через 2 часа после еды, прием пищи и соды приносит облегчение. Из анамнеза – жалобы беспокоят в течение двух лет, не обследовался. Обострения связывает с нарушением режима питания. При осмотре: язык обложен белым налетом. Локальная болезненность в эпигастральной области. Какой синдром является ведущим у данного больного?", "a": "Ведущий синдром — болевой (язвенная болезнь двенадцатиперстной кишки).", "level": "ПОНИМАНИЕ"}, {"q": "На приеме у участкового терапевта больная Г, 34 года, бухгалтер. Жалуется на боли по ночам в эпигастральной области, изжогу, кислый вкус во рту, раздражительность. Из анамнеза: считает себя больной в течение 3 лет, когда начались проблемы на работе, больная начала курить по 10-15 сигарет в день. Боль купируется приемом раствора соды. Питается регулярно в столовой. Спортом не занимается. Объективно: состояние больной удовлетворительное. При физикальном обследовании систем органов отклонений не выявлено. ЭГДС: пищевод проходим, слизистая не изменена. Желудок обычной формы. Слизистая в антральном отделе гиперемирована, складки утолщены. Двенадцатиперстная кишка не изменена. Какие факторы риска развития синдрома вы выявили у данной больной?", "a": "Факторы риска: стресс, курение, длительность заболевания, ночные боли.", "level": "ПОНИМАНИЕ"}, {"q": "Больной С., 36 лет, получает стационарное лечение в отделении терапии в ЧООБ. Получен анализ кала: количество 350 г, консистенция жидкая, неоформленный, черный, запах нерезкий неприятный, реакция слабощелочная, слизь и кровь присутствуют. Реакция на скрытую кровь ++.реакция на стеркобилин – присутствует. Мышечные волокна -, соединительная ткань ++, нейтральный жир – умеренно, жирные кислоты, мыла –небольшое количество. Растительная клетчатка: перевариваемая – единичные клетки, непереваримая – умеренно. Крахмал -, слизь, эпителий ++, лейкоциты ++++. Для какого синдрома наиболее характерны такие изменения в общем анализе кала?", "a": "Характерен синдром колита (воспалительный синдром кишечника).", "level": "ПОНИМАНИЕ"}, {"q": "Копрологическое исследование больного Н., 28 лет: количество 300 г, консистенция жидкая, форма – неоформленный, цвет – светло-желтый, запах нерезкий, неприятный, реакция слабощелочная, слизь присутствует. Реакция на скрытую кровь – отриц. Реакция на стеркобилин – присутствует. Микроскопическое исследование: мышечные волокна +++, соединительная ткань +++, нейтральный жир ++, жирные кислоты, мыла – небольшое количество. Растительная клетчатка: перевариваемая – единичные клетки, неперевариваемая – умеренно. Крахмал -, слизь и эпителий ++, лейкоциты единичные. Наличие какого синдрома можно заподозрить у больного?", "a": "Признаки синдрома недостаточности пищеварения в желудке (гастрогенная стеаторея и креаторея).", "level": "ПОНИМАНИЕ"}, {"q": "Копрологическое исследование больного Ж., 32 года: количество за сутки – 850 г, консистенция жирная, форма- неоформленный, цвет светлый, запах резкий, неприятный, реакция слабощелочная, слизь и кровь отсутствуют. Реакция на скрытую кровь – отрицательная, реакция на стеркобилин – присутствует. Микроскопическое исследование: мышечные волокна +++, соединительная ткань +++, нейтральный жир +++, жирные кислоты и мыла ++. Растительная клетчатка: перевариваемая – единичные клетки, непереваримая – единичные влетки. Крахмал +++, слизь и эпителий ++, лейкоциты сплошь. О нарушении функции какого органа и о каком синдроме идет речь?", "a": "Нарушение функции поджелудочной железы — синдром внешнесекреторной недостаточности (панкреатическая стеаторея и креаторея).", "level": "ПОНИМАНИЕ"}, {"q": "Больная Н., 40 лет, обратилась к участковому терапевту с жалобами на слабость, изжогу, тошноту, тяжесть в эпигастральной области (после еды), черный дегтеобразный стул в течение 2 дней. Из анамнеза: язвенная болезнь в течение 5 лет, обострения 1-2 раза в год. При осмотре: бледность кожных покровов и слизистых. АД 100/60 мм.рт.ст., ЧСС 99 в мин. Какое дополнительное обследование целесообразно назначить больной?", "a": "Назначить ЭГДС (эзофагогастродуоденоскопию) для выявления источника желудочно-кишечного кровотечения.", "level": "ПОНИМАНИЕ"}, {"q": "Больной К., 35 лет, доставлен в терапевтическое отделение с жалобами на опоясывающую боль в надчревной области, общую слабость, нарушения сна. Боль усиливается после приема жирной, жареной пищи. Объективно: общее состояние средней тяжести, положение вынужденное, на левом боку. При исследовании органов дыхания и кровообращения отклонений не выявлено. Пульс 86 в мин. АД 110/75 мм.рт.ст. Язык влажный, обложен белым налетом. Живот мягкий, болезненный в левой пупочной и подреберной области. Симптом Мейо-Робсона положительный. Край печени выступает из под края реберной дуги на 2 см, безболезненный. О поражении какого органа идет речь?", "a": "Речь идет о поражении поджелудочной железы (острый панкреатит).", "level": "ПОНИМАНИЕ"}, {"q": "318. Больной Д., 39 лет, доставлен в приемное отделение территориальной больницы с жалобами на опоясывающую боль в надчревной области, поносы, вздутие живота. Боль усиливается после приема жирной, жареной пищи, алкоголя. Объективно: положение больного вынужденное, на левом боку. Язык влажный, обложен белым налетом. Живот вздут, болезненность в зоне Шоффара. Симптом Мейо-Робсона положительный. Край печени выступает из под края реберной дуги на 2 см, безболезненный. Как вы считаете, какие изменения в общем анализе кала будут у этого больного?", "a": "В общем анализе кала ожидаются: стеаторея (нейтральный жир, жирные кислоты), креаторея (мышечные волокна), амилорея.", "level": "ПОНИМАНИЕ"}, {"q": "Больная Ч., 45 лет, обратилась в скорую помощь с жалобами на выраженную опоясывающую боль в эпигастральной области, общую слабость, частый жидкий зловонный стул, похудение на 8 кг за 2 недели. Боль усиливается после приема жирной, жареной пищи. В анамнезе злоупотребление алкоголем. Объективно: общее состояние средней. При исследовании органов дыхания и кровообращения отклонений не выявлено. Пульс 90 в мин. АД 130/85 мм.рт.ст. Язык влажный, обложен желтоватым налетом. Живот вздут, при пальпации болезненность в точке Мейо-Робсона, урчание. Край печени выступает у края реберной дуги, безболезненный. Какие изменения могут быть выявлены у данной больной при биохимическом исследовании крови?", "a": "В биохимическом анализе крови — повышение амилазы, липазы, гипопротеинемия, гипоальбуминемия, возможно — гипергликемия.", "level": "ПОНИМАНИЕ"}, {"q": "Больной И., 45 лет, поступил в приемное отделение инфекционной больницы с жалобами на поносы (до 4 раз в день), боли опоясывающего характера в эпигастрии, субфебрильная температура. В анамнезе – за день до заболевания принимал алкоголь, возможно, ел недоброкачественные консервы. При осмотре: язык обложен белым сухим налетом, живот вздут, болезненность при поверхностной пальпации в зоне Шоффара. Врачом был выставлен диагноз: острый панкреатит. Какие данные в общем анализе кала могут подтвердить диагноз врача?", "a": "В копрограмме: стеаторея (+++), креаторея (+++), нейтральный жир, непереваренная клетчатка, слизь.", "level": "ПОНИМАНИЕ"}, {"q": "Копрологическое исследование больного Ж, 57 лет: количество в сутки 900 г, консистенция мягкая, форма - неоформленный, цвет светлый, запах резкий, реакция слабощелочная, реакция на стеркобилин – положительная, реакция на скрытую кровь – отрицательная. Микроскопическое исследование: мышечные волокна +, соединительная ткань ++, нейтральный жир +++, жирные кислоты, мыла +++. Растительная клетчатка: перевариваемая – единичные клетки, неперевариваемая – умеренно. Крахмал – ++, слизь, эпителий единичный, лейкоциты единичные. Для какого синдрома характерны данные изменения?", "a": "Данные изменения характерны для синдрома нарушенного переваривания (мальдигестии) при экзокринной недостаточности поджелудочной железы.", "level": "ПОНИМАНИЕ"}, {"q": "Больная Ж., 45 лет. Обратилась к участковому врачу с жалобами на боли в эпигастрии ноющего характера, в левом и правом подреберьях, непереносимость жирной пищи, тошноту, кровоточивость десен, общую слабость. Данные симптомы беспокоят в течение последних 5 лет, обследование ранее не проходила. Из анамнеза: Бухгалтер. Перенесенные инфекции: желтуха в детстве. Со слов больной, «через 2-3 года после перенесенной болезни врачи обнаружили в крови хроническую желтуху», однако больная чувствовала себя хорошо, лечение не получала. Объективно: пониженного питания, кожные покровы влажные, пальмарная эритема, на грудной клетке «сосудистые звездочки». Живот увеличен в объеме. Расширение подкожных вен передней брюшной стенки. Печень выступает из-под края реберной дуги на 5 см, уплотнена. Как вы считаете, какой синдром развился у больной?", "a": "У больной сформировался синдром портальной гипертензии при циррозе печени.", "level": "ПОНИМАНИЕ"}, {"q": "324. Больная К., 37 лет, бухгалтер, поступила в приемное отделение городской больницы с жалобами на острые боли в правом подреберье с иррадиацией вверх и в правую лопатку, рвоту с примесью желчи, изменение окраски мочи до цвета пива и обесцвеченный кал. Из анамнеза: заболела остро, после употребления жирной пищи. При осмотре: гиперстенической конституции, иктеричность склер, слизистых мягкого неба, лихорадка. При пальпации живота – положительный симптом Ортнера-Мюси, напряжение мышц передней брюшной стенки. Укажите, какие изменения при лабораторном обследовании могут быть выявлены у данной больной?", "a": "В лабораторных анализах будут: повышение общего и прямого билирубина, щелочной фосфатазы, гамма-ГТ, амилазы, возможен лейкоцитоз и повышение СОЭ.", "level": "ПОНИМАНИЕ"}, {"q": "324.Больной А, 16 лет, обратился в приемное отделение инфекционной больницы. Считает себя здоровым, жалоб не предъявляет. Направлен в инфекционную больницу после случая заболевания одноклассника «желтухой». Из анамнеза: до обследования в течение 6-7 дней чувствовал себя плохо, беспокоили слабость, плохой аппетит, однократная рвота, тяжесть в правом подреберье. Температуру не измерял. Отмечает, что, моча стала несколько темнее. При осмотре: состояние больного удовлетворительное. Желтушности кожных покровов не отмечается. Иктеричность склер. Пульс 74 в мин, ритмичный. Печень на 2 см ниже реберной дуги, селезенка у края реберной дуги. Моча темная. Кал нормальной окраски. Какое обследование нужно назначить больному?", "a": "Назначить анализ крови на маркеры вирусных гепатитов (anti-HAV IgM, HBsAg, anti-HCV) и биохимический анализ крови с билирубином и трансаминазами (АЛТ, АСТ).", "level": "ПОНИМАНИЕ"}, {"q": "К участковому врачу обратился больной Ж., 40 лет, с жалобами на недомогание, выраженную слабость, головокружение. Состояние развивалось постепенно в течение недели. При осмотре у больного желтушность кожных покровов и склер. Данные дополнительных обследований: в крови повышение билирубина за счет непрямого. При проведении дуоденального зондирования – порция В интенсивно-оливкового цвета. Кал темнокоричневый, оформленный. Какое дополнительное обследование целесообразно назначить больному для подтверждения диагноза?", "a": "Необходимо назначить исследование крови на гемолиз: уровень ЛДГ, гаптоглобина, ретикулоцитов и мазок периферической крови для исключения гемолитической анемии.", "level": "ПОНИМАНИЕ"}, {"q": "327. Больная С, 12 лет, поступила в приемное отделение детской больницы. Жалуется на потемнение цвета мочи в виде «мясных помоев», отеки на лице, ноющие боли в пояснице с обеих сторон. Общий анализ мочи: удельный вес 1022, цвет красный, белок 0,750 г/л, эпителий плоский 6-7 в п/зр, лейкоциты 4-5 в п/зр, эритроциты измененные 25-30 в п/зр, гиалиновые и зернистые цилиндры 3-4 в п/зр. Какой синдром развился у больной?", "a": "У больной развился мочевой (нефритический) синдром при остром гломерулонефрите.", "level": "ПОНИМАНИЕ"}, {"q": "330. Больной Ч, 60 лет, обратился в скорую помощь с жалобами на тянущие боли в надлобковой области, чувство переполнения мочевого пузыря, частые позывы на мочеиспускание, при этом моча выделяется каплями. Как называется состояние, развывшиеся у больного?", "a": "У больного развилось острое задержание мочеиспускания (ischuria paradoxa), чаще всего из-за обструкции выходного отдела мочевого пузыря, например, при аденоме предстательной железы.", "level": "ПОНИМАНИЕ"}, {"q": "Больная Ж, 52 года, обратилась к семейному врачу; жалуется на общую слабость, быструю утомляемость, головокружение, шум в ушах, мелькание мушек перед глазами, одышку, сердцебиение, усиливающиеся при физической нагрузке, чувство покалывания в ногах. При объективном исследовании: гиперстеник, лицо одутловатое, кожа и слизистые бледные. Систолический шум на верхушке сердца. В общем анализе крови: эритроциты 2,9 х 1012/л, гемоглобин – 109 г/л, цветной показатель 1,5, ретикулоциты 1%, тромбоциты 96 х 109/л, лейкоциты 4,0 х 109/л, базофилы 1%, нейтрофилы сегментоядерные 70%, палочкоядерные 3%, лимфоциты 20%, моноциты 6%, СОЭ 5 мм/ч. Анизоцитоз, пойкилоцитоз, тельца Жолли, тельца Кебота. Каков характер анемии больной?", "a": "У больной мегалобластная анемия (пернициозная, В12-дефицитная) – цветовой показатель повышен, анемия макроцитарная, есть тельца Жолли и Кебота, неврологические симптомы.", "level": "ПОНИМАНИЕ"}, {"q": "В поликлинику по месту жительства обратилась больная П, 47 лет. Жалуется на общую слабость, быструю утомляемость, головокружение, шум в ушах, мелькание мушек перед глазами, одышку, сердцебиение. Жалобы возникли 2 дня назад, также была температура тела 38,20С. 5 дней назад вернулась из командировки из Индии. При осмотре: состояние удовлетворительное. Кожные покровы лимонно-желтого цвета. Температура 36,40С. Патологии со стороны других органов выявлено не было. В общем анализе крови: эритроциты 3,0 х 1012/л, гемоглобин – 95 г/л, цветной показатель 0,85, ретикулоциты 13%, тромбоциты 205 х 109/л, лейкоциты 6,2 х 109/л, базофилы 1%, нейтрофилы сегментоядерные 72%, палочкоядерные 3%, лимфоциты 20%, моноциты 8%, СОЭ 25 мм/ч. Общий билирубин 45 мкмоль/л, прямой 2 мкмоль/л. Какой характер анемии развился у больной?", "a": "У больной гемолитическая анемия – лимонно-жёлтая кожа, повышен непрямой билирубин, ретикулоцитоз, анемия появилась остро после поездки в Индию (возможна малярия).", "level": "ПОНИМАНИЕ"}, {"q": "Мужчина, 50 лет, поступил в клинику с жалобами на сухость во рту, жажду, частое мочеиспускание, слабость. Данные жалобы беспокоят около месяца. Объективно: повышенного питания, кожа сухая, чистая. Дыхание везикулярное, хрипов нет. Cor тоны ясные, ритмичные. АД – 150/90 мм.рт.ст. ЧСС – 64 в мин. Лабораторно: глюкоза венозной плазмы натощак – 12,0 ммоль/л. Интерпретируйте, какой синдром у данного пациента?", "a": "У пациента синдром гипергликемии – глюкоза венозной плазмы >11,1 ммоль/л на фоне симптомов (жажда, полиурия, слабость) подтверждает сахарный диабет.", "level": "ПОНИМАНИЕ"}, {"q": "Интерпретируйте, какой синдром у данного пациента?", "a": "У юноши кетоацидотическая кома (диабетический кетоацидоз). Острая декомпенсация СД 1 типа – диабетический кетоацидоз с развитием комы.", "level": "ПОНИМАНИЕ"}, {"q": "338. Женщина, 57 лет, поступила в клинику с жалобами на слабость, головную боль, сухость по рту, повышение АД до 160/90 мм рт. ст., боль в области сердца, в поясничном отделе позвоночника при физической нагрузке. Объективно: округлое лицо, рубеоз щек, рост – 167 см, вес – 92 кг. ИМТ – 34,0 кг/м2, окружность талии – 120 см, окружность бедер – 100 см, на коже живота, бедер бледные стрии. Определите, какая степень ожирения (по индексу массы тела) у данной пациентки?", "a": "Ожирение I степени (ИМТ 30–34,9)", "level": "ПОНИМАНИЕ"}, {"q": "Мужчина, 50 лет, поступил в клинику с жалобами на сухость во рту, жажду, частое мочеиспускание, слабость. Из анамнеза: вышеуказанные жалобы беспокоят около месяца. Объективно: кожа сухая, чистая. Дыхание везикулярное. Тоны сердца ясные, ритмичные. АД - 150/90 мм рт. Лабораторно: уровень глюкозы в крови - 12,0 ммоль. Врач диагностировал гипергликемию. Объясните, в результате нарушения секреции какого гормона наблюдается гипергликемия в данном случае?", "a": "Причина гипергликемии – недостаточность инсулина, т.е. нарушение секреции инсулина (возможный сахарный диабет 2 типа).", "level": "ПОНИМАНИЕ"}, {"q": "Больная М, 38 лет, жалуется на жажду, сухость во рту, ночное мочеиспускание (до 2 раз за ночь), снижение зрения, зуд кожи. Из анамнеза: жалобы появились около 2 лет назад, постепенно нарастая. Наследственность не отягощена. Объективно: состояние удовлетворительное. Кожные покровы, слизистые сухие. Рост 170 см, вес 97 кг. Какое обследование нужно назначить больной для подтверждения диагноза?", "a": "Необходимо назначить определение глюкозы венозной плазмы натощак и гликозилированного гемоглобина (HbA1c) для диагностики сахарного диабета 2 типа.", "level": "ПОНИМАНИЕ"}, {"q": "Женщина, 30 лет, обратилась на прием к эндокринологу с жалобами на выпадение волос, отеки на нижних конечностях, зябкость, огрубение голоса. Из анамнеза: данные жалобы появились после перенесенной около 2 месяцев назад ОРВИ. Объективно: рост – 170 см, вес - 89 кг. Кожа сухая, бледная. Определяются плотные отеки на лице, пальцах рук и нижних конечностях. АД 110/80 мм.рт.ст. ЧСС 50 в мин. Лабораторно: ТТГ – 10,6 мМЕ/л, Т4св – 4,2 пмоль/л. Интерпретируйте, какой синдром у данной пациентки?", "a": "У пациентки развивается первичный гипотиреоз (поствирусный тиреоидит) с манифестацией микседематозного синдрома.", "level": "ПОНИМАНИЕ"}, {"q": "Мужчина, 38 лет, поступил в клинику с жалобами на учащенное сердцебиение, перебои в работе сердца, потливость, дрожь в теле, слабость. Из анамнеза: данное состояние отмечает в течение нескольких лет. Объективно: кожа влажная. Видимый верхушечный толчок в V межреберье по передне-подмышечной линии. Пульс аритмичный, 98 в мин. ЧСС – 156 в мин. АД 170/60 мм.рт.ст. ЭКГ: тахисистолическая форма мерцательной аритмии. Интерпретируйте, какой синдром у данного пациента?", "a": "У пациента тиреотоксикоз (гипертиреоз) с тахисистолической формой мерцательной аритмии.", "level": "ПОНИМАНИЕ"}, {"q": "Интерпретируйте, какая форма синдрома гипотиреоза имеет место у данной пациентки?", "a": "У пациентки развивается постоперационный (ятрогенный) гипотиреоз после струмэктомии.", "level": "ПОНИМАНИЕ"}, {"q": "МЕ/мл.Интерпретируйте, какой синдром у данной пациентки?", "a": "У беременной — тяжёлый тиреотоксикоз (болезнь Грейвса-Базедова) с высоким уровнем антител к рецептору ТТГ.", "level": "ПОНИМАНИЕ"}, {"q": "Женщина, 58 лет, обратилась на прием к эндокринологу с жалобами на сухость кожи, выпадение волос, отеки на лице, пальцах рук, нижних конечностях, зябкость, снижение памяти и слуха. Из анамнеза: данные жалобы беспокоят около месяца. Объективно: кожа сухая, одутловатость лица, плотные отеки пальцев рук, нижних конечностей. Щитовидная железа плотно-эластической консистенции. АД 100/70 мм.рт.ст. Пульс ритмичный, 54 в мин. Интерпретируйте, в результате снижения уровня какого гормона наблюдается данное состояние?", "a": "Состояние обусловлено снижением уровня тиреоидных гормонов (Т3 и Т4) — проявление гипотиреоза.", "level": "ПОНИМАНИЕ"}, {"q": "Больная А., 67 лет. Жалобы на боли в коленных, тазобедренных суставах, при движениях и при спуске по лестнице. Из анамнеза: боли в суставах в течении 5-6 лет. На кистях рук узелки Гебердена и Бушара. С-реактивный белок – отрицательный. Ревматоидный фактор – отрицательный. Рентгенография коленных суставов: сужение межсуставных щелей, субхондральный остеосклероз, остеофиты. О каком синдроме идет речь?", "a": "У пациентки синдром деформирующего остеоартроза (артроз).", "level": "ПОНИМАНИЕ"}, {"q": "В приемное отделение инфекционной больницы поступил ребенок И., 5 лет. Жалобы на температуру до 390С, сухой кашель, боль в горле, высыпания. Из анамнеза: температура поднялась накануне вечером. Ребенок посещает детский сад, вспышки инфекционных заболеваний отрицает. При осмотре: состояние средней тяжести, ребенок вялый. Температура 38,60С. Зев гиперемирован. Гиперемия лица. Сыпь пятнисто-популезная, в естественных складках, не сливается. Увеличение и болезненность околоушных и затылочных лимфатических узлов. Какую инфекцию можно предположить у данного пациента?", "a": "У ребенка вероятна краснуха.", "level": "ПОНИМАНИЕ"}, {"q": "В приемное отделение инфекционной больницы поступил пациент Н, 7 лет. Жалуется на сильную боль в горле, температуру, озноб, тошноту. Из анамнеза: заболел около 2 дней назад, после употребления мороженного почувствовал вечером боль в горле. На следующий день поднялась температура до 37,50С, начал поласкать горло раствором соды. Сегодня появилась сыпь. При осмотре: состояние средней тяжести. Температура 38,70С. Щеки ярко-красного цвета. Зев гиперемирован, миндалины увеличены, с гнойным налетом. Язык малинового цвета. В складках шеи, подмышечных ямках, на боковых поверхностях туловища мелкоточечная сыпь на покрасневшей коже. Шейные лимфатические узлы увеличены, болезненные. Какое инфекционное заболевание можно предположить у больного?", "a": "У ребенка клиническая картина соответствует скарлатине.", "level": "ПОНИМАНИЕ"}, {"q": "Мужчина 43 года, безработный около года, обратился с жалобами на головные боли, которые беспокоят его в течение 6 месяцев. При дальнейшем расспросе выяснилось, что боли имеют давящий, стягивающий характер, интенсивность боли незначительная, возникновение боли не связано с физической нагрузкой. Кроме того, боль никогда не сопровождалась тошнотой или рвотой. Какой клинический диагноз наиболее вероятен?", "a": "Наиболее вероятный диагноз — головная боль напряжения.", "level": "ПОНИМАНИЕ"}, {"q": "Женщина 28 лет, обратилась к врачу с жалобами на приступообразные пульсирующие боли в левой половине головы, которые беспокоят несколько раз в год. Пациентка заметила, что довольно часто приступ возникал после употребления красного вина с сыром. Приступу предшествует нарушение зрения в виде выпадения правых половин поля зрения. Головная боль сопровождается тошнотой, иногда рвотой, анальгетиками купируется плохо. Обычно приступ продолжается несколько часов. При каком заболевании обычно имеют значение пищевые триггеры?", "a": "Заболевание — мигрень с аурой, при котором важную роль играют пищевые триггеры.", "level": "ПОНИМАНИЕ"}, {"q": "Больная 34 года, предъявляет жалобы на приступообразно появляющиеся интенсивные боли в области нижней челюсти слева, сочетающиеся с приступами стреляющей боли. Часто боли провоцируются приемом охлажденных напитков, чисткой зубов. Прием анальгетиков слабо купируют приступы боли. Больная проконсультировалась со стоматологом, врач не выявил патологии со стороны зубов. Какой из перечисленных диагнозов наиболее вероятен в данном случае?", "a": "Наиболее вероятный диагноз — невралгия тройничного нерва.", "level": "ПОНИМАНИЕ"}, {"q": "Пациент Л., 26 лет, обратился с жалобами на гнойное отделяемое из глаз, чувство сухости и инородного тела в глазах. Из анамнеза: жалобы появились утром. Накануне отдыхал на природе, купался. При осмотре: слизистая оболочка глаз гиперемирована с обоих сторон, в области наружного угла глаза – скопление гнойного отделяемого. Наличие какого заболевания можно заподозрить у больного?", "a": "У пациента можно заподозрить острый бактериальный конъюнктивит.", "level": "ПОНИМАНИЕ"}, {"q": "Больная П., 50 лет. При посещении рынка внезапно почувствовала себя плохо, появилось чувство сильной тревоги, чувство нехватки воздуха, потливость, сердцебиение, больная перестала осознавать реальность происходящего вокруг, стала кричать, привлекать к себе внимание. Была вызвана скорая помощь. При осмотре: больная возбуждена, активно жестикулирует. На вопросы отвечает с опозданием, после повтора. Кожные покровы бледные, влажные. Частота сердечных сокращений 115 в минуту, артериальное давление 130/90 мм.рт.ст. через 20 минут больная почувствовала себя лучше. Сказала, что ранее также бывали подобные случаи (последний раз - 3 месяца назад). Какой синдром развился у больной?", "a": "У пациентки развился паническая атака (паническое расстройство).", "level": "ПОНИМАНИЕ"}, {"q": "Больному К, 28 лет, в процедурном кабинете поликлиники был введен пенициллин для лечения фолликулярной ангины. Ранее пенициллин больному не вводился. Через несколько минут больной пожаловался на чувство сдавления в голосе, голос стал сиплым. Быстро стали отекать веки, лицо и шея, появилось удушье (затруднен вдох). АД 110/70 мм.рт.ст. Какое состояние развилось у больного?", "a": "У больного развился острый анафилактический отек Квинке с дыхательной недостаточностью.", "level": "ПОНИМАНИЕ"}, {"q": "Студент 3 курса факультета «Фармация» проводил курацию пациента, 39 лет, получающего стационарное лечение в отделении гастроэнтерологии. В тетради была сделана запись: «край печени закруглен, плотный, бугристый». С помощью какого клинического метода обследования были получены указанные данные студентом?", "a": "Данные получены при пальпации печени во время физикального обследования.", "level": "ПОНИМАНИЕ"}, {"q": "Плановый медицинский осмотр проходит пациент, 20 лет. Жалоб не предъявляет, наличие хронических заболеваний отрицает. При проведении общего осмотра: состояние удовлетворительное, сознание ясное, положение активное. Рост 176 см, вес 52 кг. Индекс массы тела 16,8 кг/м2. Какое заключение должен сделать врач исходя из полученного индекса массы тела?", "a": "Врач должен констатировать выраженный дефицит массы тела (истощение).", "level": "ПОНИМАНИЕ"}, {"q": "Больной, 24 года, доставлен в приемное отделение городской больницы с жалобами на удушье, сухой непродуктивный кашель. Из анамнеза: жалобы появились около 40 минут назад, после контакта с шерстью животного. С детства болеет бронхиальной астмой. Купировать приступ сальбутамолом не получилось. При осмотре: состояние средней тяжести. Положение вынужденное, с наклоном вперед. Хрипы, слышимые на расстоянии. Экспираторная одышка. Какой синдром развился у больного?", "a": "У больного развивается тяжелый приступ бронхиальной астмы с бронхоспазмом и дыхательной недостаточностью.", "level": "ПОНИМАНИЕ"}, {"q": "Больной, 42 года, был направлен на прохождение спирометрии. Получены следующие показатели: жизненная емкость легких – 4600 мл, дыхательный объем 500 мл, резервный объем выдоха – 850 мл, резервный объем вдоха 1450 мл, форсированная жизненная емкость легких 2700 мл. укажите, для какого синдрома наиболее характерны такие изменения при спирометрии?", "a": "Данные спирометрии характерны для обструктивного синдрома (например, хроническая обструктивная болезнь легких — ХОБЛ).", "level": "ПОНИМАНИЕ"}, {"q": "Студент 3 курса факультета «Фармация» проводил курацию больного, 36 лет, в отделении пульмонологии. При осмотре области сердца больного студент заметил разлитую пульсацию области сердца в 3-4 межреберьях по левому краю грудины; из анамнеза известно, что больной страдает хронической обструктивной болезнью легких в течение многих лет, по поводу чего у него развилась гипертофия правого желудочка. Как вы считаете, какую пульсацию зафиксировал студент?", "a": "Студент зафиксировал пульсацию, связанную с гипертрофией и расширением правого желудочка — «гипертрофическая пульсация правого желудочка».", "level": "ПОНИМАНИЕ"}, {"q": "Пациент, 46 лет, проходил плановый медицинский осмотр в поликлинике. При расспросе предъявляет жалобы на головные боли в височной области, появляются преимущественно вечером. Наследственность отягощена – отец умер от инфаркта в 58 лет. При осмотре: рост 160 см, вес 85 кг. ЧСС 86 в минуту, АД 165/95 мм рт.ст. Укажите, какая степень артериальной гипертензии развилась у больного?", "a": "У больного артериальная гипертензия II степени.", "level": "ПОНИМАНИЕ"}, {"q": "368. В приемное отделение городской больницы обратилась больная, 56 лет, с жалобами на приступ внезапного сердцебиения, одышку, головокружение, выраженную слабость. Из анамнеза: приступ начался после обильного приема пищи. Ранее такой приступ возник 1 месяц назад, прошел после приема валерианки. При осмотре: кожа бледная, посинение пальцев рук, носа, языка. Частота сердечного сокращения – 134 уд. в мин. Пульс ритмичный, малого наполнения, АД 125/85 мм рт.ст. На ЭКГ: ЧСС 150 в минуту, зубец Р отсутствует, комплексы QRS не изменены. Какое нарушение ритма можно заподозрить у данного пациента?", "a": "У больной вероятна пароксизмальная суправентрикулярная тахикардия (наджелудочковая тахикардия).", "level": "ПОНИМАНИЕ"}, {"q": "369. В отделении терапии получает лечение больной, 50 лет. Поступил 12 часов назад с жалобами на чувство нехватки воздуха, выраженную слабость, сердцебиение, давящие боли в области появлением отеков на ногах. Из анамнеза известно, что заболевание сердца в течение 8 лет, принимает Нитроглицерин по 1 таблетке при возникновении боли. Данный приступ связывает с подъемом по лестнице в быстром темпе. При осмотре: повышенного питания. Положение ортопноэ. Акроцианоз. Отеки нижних конечностей до уровня голеней. АД 140/90 мм рт.ст. ЧД 22 в минуту. На ЭКГ – подъем сегмента ST на 5 мм над изолинией. Каков механизм развития одышки у данного больного?", "a": "Механизм развития одышки — застойная сердечная недостаточность с развитием легочного отека и снижением функции левого желудочка.", "level": "ПОНИМАНИЕ"}, {"q": "В поликлинику к семейному врачу обратился больной, 25 лет, с жалобами на чувство жжения за грудиной. Чувство возникает в эпигастральной области, затем поднимается вверх, иногда до области шеи. Усиливается при наклонах туловища, напряжении пресса, в положении лежа. Особенно сильно беспокоит после приема обильной жирной, жареной пищи, после употребления газировки. Из анамнеза: жалобы беспокоят в течение последних 3 месяцев. В студенчестве болел гастритом, однако курс лечения до конца не прошел, рекомендуемую диету не соблюдал. Как называется симптом, развившийся у больного?", "a": "У больного развился типичный симптом изжоги (пироз), связанный с гастроэзофагеальным рефлюксом.", "level": "ПОНИМАНИЕ"}, {"q": "Больной, 39 лет, обратился к семейному врачу с жалобами на частный жидкий, зловонный стул. Стул 3-5 раз в день, неоформленный, желтого цвета; часто появляется после приема пищи. Из анамнеза: данные жалобы беспокоят в течение 6-8 месяцев; появились на фоне систематического употребления алкоголя. Больной похудел на 12 кг. Вредные привычки: крепкие алкогольные напитки употребляет 4-5 раз в неделю, в течение 4 лет. При осмотре: рот 179 см, вес 63 кг. Живот впалый. Иктеричность склер. Кожные покровы бледные. В анализе кала: креаторея, стеаторея, амилорея. Как вы считаете, какова причина развития синдрома диареи у данного больного?", "a": "Причина диареи — хронический панкреатит с нарушением экзокринной функции поджелудочной железы.", "level": "ПОНИМАНИЕ"}, {"q": "Больной, 30 лет, поступил в инфекционное отделение с жалобами на схваткообразные боли в области живота, частый жидкий стул, приносящий облегчение, на общую слабо
