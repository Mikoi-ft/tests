сть, недомогание. Больной связывает начало своего заболевания с употреблением готовой пищи на местном рынке. Приехал из другой страны. При осмотре: положение вынужденное, на боку с приведенными конечностями. Сухость кожных покровов, слизистых. Пальпация живота болезненная в эпигастральной, пупочной областях. В общем анализе кала: неоформленный, жидкий, зловонный. Как вы считаете, какова причина развития синдрома диареи у данного больного?", "a": "Синдром диареи обусловлен острым бактериальным гастроэнтеритом (вероятно, инфекция пищевого происхождения).", "level": "ПОНИМАНИЕ"}, {"q": "В приемное отделение городской больницы поступил больной, 54 года, с жалобами на выраженную слабость, бессонницу, боли в области правого и левого подреберья, отеки нижних конечностей, увеличения живота в объеме. Хроническим вирусным гепатитом «В» страдает более 15 лет; лечение не получал. При осмотре: пониженного питания. Кожные покровы желтушные. Живот увеличен в объеме, на передней брюшной стенке – увеличенные подкожные вены. Как называется симптом увеличенных подкожных вен живота у данного больного?", "a": "Симптом увеличенных подкожных вен живота называется «голова медузы» и свидетельствует о портальной гипертензии. Асцит.", "level": "ПОНИМАНИЕ"}, {"q": "Пациентка, 74 года, обратилась к семейному врачу с жалобами на появление жажды, сухости во рту, участилось мочеиспускание, ночью каждые 2-3 часа. Похудела на 6 кг за 1 месяц. Из анамнеза: болеет гипертонической болезнью в течение 12 лет, принимает Эналаприл, Амлодипин. Укажите, как называется синдром появления и преобладания ночного диуреза над дневным?", "a": "Синдром называется никтурия — преобладание ночного диуреза над дневным.", "level": "ПОНИМАНИЕ"}, {"q": "Больной, 60 лет, обратился в приемное отделение больницы с жалобами на выраженную боль в поясничной области, с иррадиацией в пах, отсутствие мочи в течение 12 часов. При осмотре: положение вынужденное. Холодный липкий пот. Мочеточниковые точки резко болезненны. На обзорной рентгенограмме брюшной полости: о области I-III поясничных позвонков определяются множественные очаговые тени с обеих сторон. Укажите, какое неотложное состояние возникло у данного больного?", "a": "У больного развивается острая задержка мочи на фоне уролитиаза с возможной острой почечной коликой и/или острой почечной недостаточностью (неотложное состояние — острая почечная колика с обструкцией мочевых путей).", "level": "ПОНИМАНИЕ"}, {"q": "На приеме у семейного врача пациентка, 20 лет, с жалобами на общую слабость, головокружение при вставании, извращение вкуса и запахов. Жалобы беспокоят в течение года. При осмотре: бледность кожных покровов и видимых слизистых, ломкость и поперечная исчерченность ногтей, волосы тусклые и ломкие. ЧСС 94 в минуту. Пульс мягкий, частый, скорый, малого наполнения. Уровень гемоглобина – 93 г/л. Укажите, для какого вида анемии характерны подобные изменения?", "a": "У пациента анемия типа железодефицитной анемии (характерны бледность кожи, ломкость ногтей, глоссит, снижение гемоглобина).", "level": "ПОНИМАНИЕ"}, {"q": "В приемное отделение городской больницы поступил больной, 39 лет. Жалобы на плохое самочувствие, непродуктивный кашель, похудение, сниженный аппетит, потливость, повышение температуры тела до 38,5-39,5 0С утром, и снижение температуры тела к вечеру до 36,0-36,5 0С. Из анамнеза: жалобы беспокоят в течение 4-6 недель. При осмотре: рост 185 см, вес 59 кг. Кожные покровы влажные. ЧД 24 в минуту, ЧСС 89 в минуту, АД 120/70мм рт.ст. На обзорной рентгенограмме грудной клетки – множественные очаговые тени в области верхушки левого легкого. Какой тип лихорадки наблюдается у данного больного?", "a": "У больного наблюдается интермиттирующая (возвратная) лихорадка — характерна для туберкулеза лёгких, когда температура тела повышается утром и снижается к вечеру.", "level": "ПОНИМАНИЕ"}, {"q": "Больная, 58 лет, была направлена участковым врачом на рентгенограмму коленных суставов. На снимке: рентгенопрозрачность костной ткани повышена, трабекулярный рисунок обеднен в эпифизах костей суставных поверхностей, истончение замыкательных пластинок суставных поверхностей костей, субэндостальная резорбция костной ткани. Какому процессу соответствует полученная на рентгенограмме картина?", "a": "Рентгенологическая картина соответствует остеопорозу (повышенная рентгенопрозрачность, истончение костной ткани и замыкательных пластинок, субэндостальная резорбция).", "level": "ПОНИМАНИЕ"}, {"q": "Ребенок, 4 года, поступил в инфекционную больницу с жалобами на недомогание, плохой аппетит, повышение температуры тела до 39 0С, высыпания. Со слов матери, температура в течение 3 дней, накануне вечером заметила появление сыпи. Из родственников, в детском коллективе никто не болел, однако 14 дней назад посещал детский бассейн. При осмотре: кожа лица гиперемирована, с единичными высыпаниями. Затылочные лимфатические узлы увеличены, болезненны. Насморк, гиперемия задней стенки глотки. Какое заболевание развилось у ребенка?", "a": "У ребенка развилось заболевание — корь (характерны лихорадка, катаральные явления, гиперемия лица, конъюнктивит, лимфаденит, сыпь).", "level": "ПОНИМАНИЕ"}, {"q": "Больной, 58 лет, обратился с жалобами на кашель с отхождением мокроты желто-зеленого цвета, повышение температуры тела до 38,7º С, одышку при физической нагрузке, болевые ощущения в правой половине грудной клетки, возникающие при кашле и глубоком вдохе, потливость, общую слабость и головную боль. Заболел остро 3 дня назад, после переохлаждения. Объективно: Грудная клетка эмфизематозная, при осмотре - отставание правой половины грудной клетки при дыхании. Перкуторно на фоне коробочного звука отмечается участок притупления справа ниже угла лопатки, в этой же области – усиление голосового дрожания. При аускультации выслушиваются рассеянные сухие жужжащие хрипы, справа ниже угла лопатки – зона крепитации. О каком синдроме можно подумать?", "a": "У больного развивается плевропневмонический синдром — воспаление лёгких с вовлечением плевры (боль в грудной клетке, крепитация, притупление при перкуссии, голосовое дрожание, хрипы).", "level": "ПОНИМАНИЕ"}, {"q": "Больной, 19 лет, поступил с жалобами на резкое затруднение дыхания, преимущественно выдоха, кашель с отделением вязкой стекловидной мокроты, чаще в ранние утренние часы. Из анамнеза: Пациент курит по 1 пачке сигарет в день в течение 10 лет. Ухудшение состояния в течение недели, после ОРВИ. Объективно: состояние средней тяжести. Дистанционные свистящие хрипы. Грудная клетка бочкообразной формы. ЧД 24 в мин. Перкуторный звук над легочными полями коробочный. В легких дыхание резко ослаблено, выслушивается большое количество сухих свистящих хрипов над всей поверхностью легких. ФВД: ЖЕЛ – 87%; ОФВ1 – 53%; ОФВ1/ФЖЕЛ – 82%. Какой синдром развился у больного?", "a": "У больного развивается обструктивный бронхит с синдромом хронической обструкции дыхательных путей (ХОБЛ). Жалобы: кашель с вязкой стекловидной мокротой, одышка преимущественно на выдохе, курение — факторы риска. ФВД: снижение ОФВ1 (53%) при нормальном ЖЕЛ (87%), соотношение ОФВ1/ЖЕЛ в норме (82%) — характерно для обструктивного синдрома с сохранением жизненной ёмкости.", "level": "ПОНИМАНИЕ"}, {"q": "К больной, 70 лет, была вызвана бригада скорой медицинской помощи. Больная жалуется на резкое ухудшение состояния, выраженные головные боли, тошноту, однократную рвоту, потливость, мелькание мушек перед глазами, шум в ушах. Из анамнеза: у больного повышается давление в течение 15 лет, принимает лизиноприл 10 мг по 1 таблетке вечером. При объективном обследовании: состояние средней тяжести, в сознании. Кожные покровы влажные. Язык влажный, обложен белым налетом. В легких – дыхание везикулярное, хрипов нет. ЧСС 100 в мин. Акцент ІІ тона над аортой. АД - 220/100 мм рт.ст. Со стороны органов ЖКТ патологии не выявлено. Какое состояние можно заподозрить у больного?", "a": "Пациентка с длительной артериальной гипертензией, резким ухудшением состояния, головной болью, тошнотой, рвотой, очень высоким давлением (АД 220/100) — вероятно, развивается гипертонический криз (возможно с проявлениями острого поражения органов-мишеней). Акцент II тона над аортой — признак гипертрофии левого желудочка. Требуется неотложная помощь.", "level": "ПОНИМАНИЕ"}, {"q": "Студент, 2 курса факультета «Фармация» проводил перкуссию сердца больному E, 65 лет, получающему лечение в отделении кардиологии по поводу КБС. Постинфарктный кардиосклероз. Атеросклероз аорты и сосудов. ГБ 3степени, очень высокого риска. Студентом были получены следующие данные: со слов больного опросник Роузе положительный в течение 10лет. Принимает препараты: карведил, кардиомагнил, клопидогрель, кортел, индап. Из обследований имеется ЭКГ без расшифровки. Укажите какие изменения могут быть на данном исследовании?", "a": "У больного с постинфарктным кардиосклерозом, атеросклерозом и тяжелой гипертонией на ЭКГ могут наблюдаться: признаки перенесенного инфаркта (постинфарктные зубцы Q, снижение зубца R в соответствующих отведениях), признаки гипертрофии левого желудочка (высокие зубцы R в левосторонних отведениях), признаки ишемии (депрессия сегмента ST, инверсия зубцов T), аритмии или нарушения проводимости (например, блокада ножки пучка Гиса).", "level": "ПОНИМАНИЕ"}, {"q": "Женшина, 35 лет, поступила с жалобами на ранее насыщение, чувства переполнение в эпигастрии и схваткообразные боли в подложечной области через 30 мин после еды. Выше указанные симптомы беспокоит в течение 6 месяцев. При обследовании на ЭГДС, УЗИ внутренних органов и рентген исследовании брюшной полости - без патологических изменений. О каком синдроме можете предположит?", "a": "У женщины с жалобами на раннее насыщение, чувство переполнения в эпигастрии и схваткообразные боли после еды, при отсутствии органических изменений на ЭГДС, УЗИ и рентгене — вероятен синдром раздражённого желудка (функциональная диспепсия) или функциональная желудочная диспепсия.", "level": "ПОНИМАНИЕ"}, {"q": "Женщина, 55 лет обратилась в поликлинику с жалобами на кашицеобразный стул возникающий после приема пищи 5-6 раз в сутки, жирного характера с зловонным запахом. В анализе кала: много непереваренных мышечных волокно, жир. Лечащий врач поставил диагноз: Хронический панкреатит. Чем обьясняется учащенный стул жирного характера у данной пациентки?", "a": "Учащенный жирный стул объясняется нарушением всасывания жиров из-за недостатка липазы при хроническом панкреатите.", "level": "ПОНИМАНИЕ"}, {"q": "Объясните какой вид желтухи развивается при усиленном гемолизе эритроцитов?", "a": "При усиленном гемолизе развивается гемолитическая (надпечёночная) желтуха.", "level": "ПОНИМАНИЕ"}, {"q": "Пациентка сдала анализ мочи по Нечипоренко: лейкоциты-1000, эритроциты - 2000, бактерии и белок- отсутствует. Интерпретируйте анализ?", "a": "Анализ мочи по Нечипоренко указывает на выраженный гематурический синдром без признаков инфекции и протеинурии.", "level": "ПОНИМАНИЕ"}, {"q": "Женщина, 67 лет, поступила в клинику с жалобами на слабость, головную боль, сухость во рту, повышение АД до 150/90 мм рт. ст., боль в области сердца, в поясничном отделе позвоночника при физической нагрузке. Объективно: рост – 167 см, вес – 92 кг. ИМТ – 34,0 кг/м2, окружность талии – 120 см, окружность бедер – 100 см, на коже живота, бедер бледные стрии. Предположите, какие изменения липидного спектра могут быть выявлены у пациентки?", "a": "У пациентки вероятна гиперхолестеринемия и гипертриглицеридемия с повышением ЛПНП и снижением ЛПВП (дислипидемия при ожирении и метаболическом синдроме).", "level": "ПОНИМАНИЕ"}, {"q": "Больная, 25 лет, заболела 4 дня назад ОРВИ. В связи с усилением частоты кашля, самостоятельно назначила и сделала себе инъекции пенициллина. Через 4 минуты после введения у больной возникло чувство жара, страха, появилась головная боль и удушье. Через 5 минут больная потеряла сознание. Была вызвана скорая помощь. При осмотре: сознание отсутствует. Кожные покровы бледные. Пульс нитевидный, АД не определяется. Объясните, выделение каких веществ способствуют развитию данных симптомов?", "a": "Для развития симптомов анафилаксии ответственны выделение гистамина, серотонина и других медиаторов аллергии из тучных клеток и базофилов.", "level": "ПОНИМАНИЕ"}, {"q": "396. Больной, 37 лет обратился к терапевту с жалобами на вялость, сонливость, выпадение волос, опущение давления в области передней поверхности шеи. Анамнез: работает на заводе по переработке урана. Объективно: замедленная речь, пастозность лица и конечностей. Щитовидная железа на глаз не видна, при пальпации больше дистальной фаланги большого пальца пациента. Узнайте по описанию какая степень увеличения щитовидной железы по ВОЗ у данного пациента?", "a": "У пациента отсутствует видимое увеличение щитовидной железы — степень 0 по ВОЗ.", "level": "ПОНИМАНИЕ"}, {"q": "В приемное отделение поступил больной в жалобы на общая слабость, увеличение и чувства напряжение в живота. При осмотре: живот увеличен и венозная сеть расширена. При пальпации симптом флюктуации положительный. Предположите какое состояние развился у пациента?", "a": "У пациента асцит с признаками внутрибрюшной жидкости и возможным абсцессом или кистозным образованием (положительный симптом флюктуации).", "level": "ПОНИМАНИЕ"}, {"q": "Больная, 49 лет, обратилась в поликлинику с жалобами на общую слабость, шум в ушах, «мелькание мушек перед глазами», желание есть мел, извращение обоняния. При осмотре: бледность и сухость кожи. Волосы ломкие, выпадают. Ногти с поперечной исчерченностью. При аускультации сердца – систолический мягкий дующий шум во всех точках, усиливающийся после физической нагрузки. В анализе крови: эритроциты 2,0х1012/л, гемоглобин 50 г/л. Какой синдром можно заподозрить у больной?", "a": "У больной симптомокомплекс мегалобластной анемии с сердечным шумом из-за анемической гипоксии.", "level": "ПОНИМАНИЕ"}, {"q": "На приеме у участкового терапевта больной Л., 27 лет. Жалуется на тошноту, двухратную рвоту, боли тянущего характера в области правого подреберья. Жалобы беспокоят в течение 5 дней, постепенно нарастая. 2 дня назад родные заметили появление желтухи. Прием лекарственных препаратов отрицает. При осмотре выявлена желтушность кожных покровов и слизистых, печень увеличена, плотная, болезненная. Назначены биохимические анализы (АЛТ, АСТ, печеночные тесты), УЗИ печени и желчевыводящих путей. Оцените, в чем заключается ошибка врача?", "a": "Ошибка врача — не назначен анализ на маркеры вирусных гепатитов (особенно HBsAg и Anti-HCV).", "level": "ПРИМЕНЕНИЕ"}, {"q": "К врачу-дерматологу обратился больной С, 30 лет, с жалобами на красные зудящие высыпания, преимущественно на спине и плечах. Беспокоят в течение 3 недель, зуд усиливается ночью. Связывает свое заболевание с погрешностями в диете. Отмечает, что в 5 лет также получал лечение от какого-то кожного заболевания. В домашних условиях проводил обработку мазью (Синафлан), после чего отметил незначительное улучшение. Предположите, какие физикальные методики будет использовать врач при обследовании больного?", "a": "Врач будет использовать: осмотр, пальпацию, пробу на симптом Бенье (расчесы), пробу с йодом (проба Апель), возможно, дерматоскопию.", "level": "ПРИМЕНЕНИЕ"}, {"q": "В пульмонологическое отделение Городской Клинической Больницы №1 поступила больная К, 45 лет. Жалобы: одышка, чувство нехватки воздуха, кашель с трудно отделяемой мокротой. При осмотре: положение вынужденное, сидит, упираясь руками о край кровати, эмфизематозная форма грудной клетки, на расстоянии слышны жужжащие и свистящие сухие хрипы. Перкуторно – над обоими легкими коробочный звук. Аускультативно: множество сухих жужжащих и свистящих хрипов. Какую первую помощь нужно оказать больной?", "a": "Первая помощь: обеспечить доступ кислорода, ингаляция бронхолитика (сальбутамол/беродуал), при необходимости — глюкокортикоиды.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Больная Ч., 67 лет, вызвала бригаду скорой медицинской помощи. Жалобы больной: головная боль в височной области, шум в ушах, нарушение зрения, давящие боли в области сердца. Из анамнеза: болеет гипертонической болезнью в течение 10 лет, принимает Амлодипин 10 мг вечером, однако накануне пропустила очередной прием. При осмотре состояние средней тяжести. Кожные покровы гиперемированы, влажные. Пульс напряженный. АД 195/110 мм.рт.ст. Какую первую помощь целесообразно оказать данной больной?", "a": "Первая помощь: Каптоприл 25 мг под язык, контроль АД, покой, ЭКГ (для исключения осложнений), при боли — нитраты.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Скорая медицинская помощь была вызвана к больному Ч, 65 лет. Жалуется на интенсивную боль за грудиной, сжимающего характера, с иррадиацией в левое плечо, лопатку. Из анамнеза: боли в сердце беспокоят более 10 лет, возникают при нагрузке, ходьбе до 500 м. принимает назначенные препараты. Данный приступ болей связывает с ссорой с соседом. Объективно: состояние тяжелое, сознание ясное, положение вынужденное – полусидячее, кожные покровы бледные, влажные. Сердечные тоны глухие. ЧСС 122 в мин. АД 135/90 мм рт.ст. На ЭКГ: подъем сегмента SТ над изолинией. Какую первую помощь нужно оказать больному?", "a": "Первая помощь: Нитроглицерин под язык, ацетилсалициловая кислота 160–325 мг разжевать, кислород, срочная госпитализация в ОКС (острый инфаркт миокарда).", "level": "ПРИМЕНЕНИЕ"}, {"q": "В приемное отделение территориальной больницы поступила больная Т, 58 лет, с жалобами на интенсивные боли в правом подреберье, тошноту, двухкратную рвоту (не приносящую облегчение), повышение температуры. Из анамнеза: боли появились около 10 часов назад, после тряской езды и нарушения диеты. Хронический холецистит более 10 лет, врачи ранее предлагали операцию, но больная отказалась. Объективно: положение вынужденное на правом боку с приведенными конечностями. Температура 37,50С. Склеры иктеричные. Кожные покровы желтушные. Пальпация живота затруднена из-за резкого напряжения мышц живота. В общем анализе крови – лейкоцитоз. В биохимическом анализе крови – общий билирубин 56 мкмоль/л, непрямой 12 мкмоль/л, прямой 44 мкмоль/л. Моча цвета пива. Какую первую помощь нужно оказать больной?", "a": "Диагноз по клинике: острый калькулезный холецистит с механической желтухой (возможно, холедохолитиаз). Первая помощь: Госпитализация в хирургическое отделение. Спазмолитики в/в или в/м (например, дротаверин). Антибактериальная терапия широкого спектра (например, цефтриаксон + метронидазол). Холод на правое подреберье, голод и покой. Подготовка к экстренной холецистэктомии, особенно при признаках перитонита или обтурации желчных путей.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Юноша, 20 лет, поступил в клинику в бессознательном состоянии. По словам родственников, ранее пациент жаловался на сильную жажду, частое мочеиспускание и общую слабость. Объективно: запах ацетона изо рта, кожа сухая. ЧД – 23 в мин. Тоны сердца приглушены. Живот напряженный. Врач ранее диагностировал острую гипергликемию. Выбрать, какой анализ в первую очередь для подтверждения данного синдрома?", "a": "Диагноз: диабетический кетоацидоз (ДКА). Анализ для подтверждения: Определение кетоновых тел в моче или крови (ацетонурия, кетонемия). Также подтвердить гипергликемию (глюкоза крови), но кетоны — приоритет для подтверждения именно кетоацидотической комы.", "level": "ПРИМЕНЕНИЕ"}, {"q": "421. Женщина, 33 лет, обратилась на прием к терапевту с жалобами на слабость, апатию, сонливость, запоры и нарушения менструального цикла. Объективно: кожа сухая, волосы сухие, ломкие. АД 120/80 мм.рт.ст. Пульс 58 ударов в минуту. Тоны сердца ослаблены. Врач диагностировал синдром гипотиреоза. Определение уровня какого гормона поможет правильно установить диагноз?", "a": "Уровень ТТГ (тиреотропного гормона) — основной маркёр гипотиреоза.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Мужчина, 29 лет, поступил в клинику с жалобами на учащенное сердцебиение, потливость, дрожь в теле, слабость, раздражительность, плаксивость. Из анамнеза: несколько лет назад перенес черепно-мозговую травму. Объективно: кожа влажная, бархатистая. Тремор пальцев рук. Экзофтальм. На шее в области щитовидной железы определяется выпячивание. При пальпации – щитовидная железа увеличена, однородная. Верхушечный толчок усилен, разлитой. Тоны сердца ясные, аритмичные. АД - 160/60 мм.рт.ст. Пульс 100 в мин. ЭКГ: мерцательная аритмия. Какое лабораторное исследование необходимо провести для подтверждения диагноза?", "a": "Уровень ТТГ и свободного Т4 — для подтверждения тиреотоксикоза (гипертиреоза).", "level": "ПРИМЕНЕНИЕ"}, {"q": "Больному Т, 9 лет, вызвали врача на дом. Ребенок жалуется на боли в горле, слабость, недомогание, отсутствие аппетита. Накануне вечером играл в холодной воде. Врач по телефону рекомендовал измерить температуру. Температура 37,90С. Какую первую помощь нужно оказать больному?", "a": "Постельный режим, тёплое питьё, жаропонижающее (при >38°С), наблюдение за симптомами.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Больному К, 28 лет, в процедурном кабинете поликлиники был введен пенициллин для лечения фолликулярной ангины. Ранее пенициллин больному не вводился. Через несколько минут больной пожаловался на чувство сдавления в голосе, голос стал сиплым. Быстро стали отекать веки, лицо и шея, появилось удушье (затруднен вдох). АД 110/70 мм.рт.ст. Какие профилактические меры нужно было провести больному для предупреждения развития этого состояния?", "a": "Провести пробу на чувствительность к пенициллину (кожную аллерго-пробу) до введения препарата.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Женщина, 65 лет, обратилась в медпункт на рынке с жалобами на внезапную выраженную головную боль, мелькание мушек перед глазами, шум в ушах, шаткость походки, выраженную слабость. Со слов больной, стало внезапно плохо после поднятия тяжестей. Головные боли ранее возникали 1-2 раза в неделю, чаще вечером. При головных болях принимала аспирин. При осмотре: рост 167 см, вес 93 кг. Гиперемия лица. Пульсация височных артерий. ЧСС 89 в минуту, АД 210/140 мм рт.ст. 30 минут назад пациентке были даны 2 таблетки Каптоприла по 25 мг под язык, однако АД составило 195/130 мм рт.ст. Какой препарат можно еще предложить данной больной?", "a": "Дать нифедипин 10–20 мг под язык или моксонидин 0,2 мг, при отсутствии эффекта — госпитализация.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Мужчине, 60 лет, внезапно стало плохо на улице. После быстрой прогулки почувствовал интенсивную боль за грудиной, сжимающего характера, с иррациацией в левое плечо, шею, нижнюю челюсть; сопровождаются страхом смерти. Также беспокоит чувство нехватки воздуха. Из анамнеза: боли в сердце беспокоят в течение 8 лет, принимает Изокет-спрей. Однако в этот раз его больной с собой не взял, боль продолжается уже в течение 35 минут. При осмотре: лицо испуганное, холодный липкий пот. Прохожий дал 1 таблетку Нитроглицерина. Какую еще неотложную помощь можно оказать больному на догоспитальном этапе?", "a": "Под язык: ацетилсалициловая кислота 160–325 мг (разжевать) и нитроглицерин каждые 5 мин (до 3 раз), обеспечить покой, вызвать скорую помощь. Больной, 63 года, получал лечение в отделении кардиологии по поводу острого инфаркта миокарда. После поднятия по лестнице почувствовал себя плохо, появилась одышка, кашель с трудноотделяемой слизистой мокротой, резкая слабость, холодный пот. При осмотре: акроцианоз, ЧД 32 в минуту, положение ортопноэ. Тоны сердца ослаблены, в нижних отделах легких – незвучные мелкопузырчатые хрипы. На ЭКГ: признаки повторного инфаркта миокарда отсутствуют. На рентгенограмме грудной клетки: явления венозного застоя. Какую первую помощь необходимо оказать больному? Второй случай: Фуросемид в/в, нитроглицерин под язык или в/в, посадить пациента с опущенными ногами, кислородотерапия, срочная госпитализация.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Больной, 43 года, обратился к семейному врачу с жалобами на частый жидкий стул (до 34 раз за день), похудение за полгода на 15 кг, выраженную слабость, боли в области пупка, метеоризм. Со слов больного, около 6-7 месяцев назад перенес операцию на поджелудочные железы по поводу врожденной кисты. После выписки при расширении диеты появились вышеуказанные жалобы. При осмотре: рост 174 см, вес 49 кг. Кожные покровы бледные. Кожа сухая. При пальпации отмечается болезненность вокруг пупка. В общем анализе кала – амилорея, креаторея, стеаторея. Какую группу препаратов можно назначить больному для облегчения его состояния?", "a": "Назначить ферментные препараты (панкреатин и др.) — компенсируют внешнесекреторную недостаточность поджелудочной железы.", "level": "ПРИМЕНЕНИЕ"}, {"q": "В приемное отделение городской больницы поступил больной, 50 лет, с жалобами на интенсивные боли в области правого подреберья, схваткообразного характера, с иррадиацией в правое плечо; также была двухкратная рвота, не приносящая облегчения. Из анамнеза: 6 лет назад был выставлен диагноз “Хронический холецистит” была пописана диета, которую больной не соблюдал. Данный приступ появился после застолья. Объективно: кожные покровы желтого цвета. Положение, вынужденное на боку с приведенными конечностями, температура 38,50С. В общем анализе крови – признаки воспаления. Моча цвета пива. В биохимическом анализе крови – прямой билирубин 45,9 мкмоль/л, непрямой – 12,4 мкмоль/л. Какова дальнейшая лечебная тактика?", "a": "Госпитализация в хирургическое отделение, проведение УЗИ и/или ЭРХПГ, при необходимости — хирургическое лечение (возможна холецистэктомия).", "level": "ПРИМЕНЕНИЕ"}, {"q": "К семейному врачу обратилась пациентка, 19 лет, с жалобами на общую слабость, головокружение при вставании, сердцебиение, извращение вкуса (желание есть глину) и запахов (нравится запах краски). Из анамнеза: симптомы беспокоят в течение 2 лет. В течение этого времени сидит на диете, с ограничением продуктов животного происхождения. При осмотре: бледность кожных покровов и слизистых. Поперечная исчерченность ногтей. Волосы ломкие. В общем анализе крови: признаки гипохромной анемии. Какая группа препаратов показана данной больной?", "a": "Назначить препараты железа (группа противоанемических средств при железодефицитной анемии).", "level": "ПРИМЕНЕНИЕ"}, {"q": "К пациенту, 19 лет, была вызвана бригада скорой медицинской помощи. Из анамнеза: болеет сахарным диабетом 1 типа в течение 4 лет. 2 дня назад отравился некачественными консервами, появилась тошнота, рвота, диарея, в связи с чем перестал вводить инсулины. Сегодня утром состояние резко ухудшилось, появилась сонливость, резко усилилась жажда. При осмотре: сознание – сопор. Сухость кожных покровов, языка. Запах ацетона в выдыхаемом воздухе. Глубокое шумное дыхание. ЧСС 118 в минуту, АД 90/60 мм рт.ст. Какую первую помощь нужно оказать данному больному на догоспитальном этапе?", "a": "На догоспитальном этапе при диабетическом кетоацидозе: в/в введение изотонического раствора натрия хлорида (0,9% NaCl), срочная госпитализация. Инсулин — только в условиях стационара, не вводят дома.", "level": "ПРИМЕНЕНИЕ"}, {"q": "В скорую медицинскую помощь обратились родители девочки 5 лет. Жалобы на высыпания по всему телу, зуд кожных покровов, повышение температуры до 37,5 0С. Из анамнеза: девочка страдает пищевой аллергией на арахис с 2 лет. Накануне пошла на праздник к подруге, где раздавали арахис-содержащие сладости. После употребления их появились вышеуказанные жалобы. При осмотре: на коже лица, живота, конечностей отмечается возвышающаяся зудящая сыпь. Какую первую помощь необходимо оказать больной?", "a": "Дать антигистаминный препарат (например, лоратадин или цетиризин), при ухудшении – вызвать скорую помощь.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Беременная, 33 года, обратилась к вачу с жалобами на жжение за грудиной. Срок беременности – 34 недели. Жалобы беспокоят последние 2 месяца, связывает с увеличением объема живота. Жжение возникает после приема пищи, усиливается в положении лежа, купируется приемом раствора соды. Гастрит в анамнезе. Выберите из перечисленного, какое исследование может подтвердить гиперацидное состояние желудочного сока?", "a": "Для подтверждения гиперацидного состояния: интрагастральная рН-метрия.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Какой препарат, по вашему мнению, может купировать данное состояние?", "a": "Состояние: стенокардия напряжения. Неотложная помощь: дать нитроглицерин (если не принимал),", "level": "ПРИМЕНЕНИЕ"}, {"q": "В медпункт обратился мужчина 62 лет, у которого после нервного перенапряжения 10 минут назад возник приступ жгучей боли за грудиной, с иррадиацией в межлопаточную область, шею, левое плечо, принял 1 таблетку нитроглицерина, без эффекта. Объективно: состояние средней тяжести, больной возбужден. Кожа бледная, влажная. тоны сердца приглушены, пульс 80 уд/мин, АД 130/90 мм рт. ст.,ЧД 22 в мин. Какую неотложную помощь можно оказать больному на догоспитальном этапе?", "a": "Состояние: возможный острый коронарный синдром. Первая помощь на догоспитальном этапе: жевательная таблетка аспирина 160–325 мг, повторный прием нитроглицерина под язык (если нет противопоказаний и прошло 5 мин), обеспечить покой, вызвать скорую помощь.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Бригада скорой медицинской помощи выехала к больному К, 53 года. Жалобы: выраженные боли в пояснице справа, с иррадиацией в пах, тошнота, двухкратная рвота, озноб. Из анамнеза: приступ болей начался около двух часов назад. Ранее иногда отмечал небольшие тянущие боли в поясничной области. Объективно: состояние средней тяжести. Больной мечется, не может найти удобное положение. Кожа влажная. Температура 37,50С. Симптом Пастернацкого резко положительный справа. Моча с примесью крови. Какую первую помощь необходимо оказать больному?", "a": "Состояние: почечная колика. Неотложная помощь: спазмолитик (например, дротаверин (Но-шпа) в/м или таблетка), обезболивающее (кеторолак в/м, если есть доступ), тепло (грелка на поясницу), доставка в стационар (исключить осложнения: обструкция, пиелонефрит).", "level": "ПРИМЕНЕНИЕ"}, {"q": "Больная С., 73 года, доставлена в приемное отделение городской больницы в бессознательном состоянии. Со слов родственников, сахарным диабетом страдает около 20 лет, месяц назад начала получать инсулинотерапию. В 8.00 дочь уколола назначенную дозу инсулина, однако больная не завтракала. Около 10.00 больная стала жаловаться на боли в области сердца, начали трястись руки, стала агрессивно себя вести. Через 10-15 минут потеряла сознание. При осмотре: сознание отсутствует. Кожные покровы бледные, влажные. Мерцательная аритмия. АД 145/100 мм.рт.ст., пульс 105 в минуту. Глюкоза крови на глюкометре 2,1 ммоль/л. Какую первую помощь нужно оказать больной?", "a": "Состояние: гипогликемическая кома. Глюкоза крови: 2,1 ммоль/л. Неотложная помощь: при наличии глотательного рефлекса: подслащённая вода, сок, глюкоза в таблетках, при нарушенном сознании: в/в 40% раствор глюкозы 40–60 мл, вызвать скорую помощь – обязательна госпитализация.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Больной, 58 лет, обратился с жалобами на кашель с отхождением мокроты желто-зеленого цвета, повышение температуры тела до 38,7º С, одышку при физической нагрузке, болевые ощущения в правой половине грудной клетки, возникающие при кашле и глубоком вдохе, потливость, общую слабость и головную боль. Заболел остро 3 дня назад, после переохлаждения. Объективно: грудная клетка эмфизематозная, при осмотре - отставание правой половины грудной клетки при дыхании. При аускультации выслушиваются рассеянные сухие жужжащие хрипы, справа ниже угла лопатки – зона крепитации. Выберите из перечисленного, какое исследование органов грудной клетки, необходимо назначить в первую очередь для подтверждения синдрома?", "a": "Симптомы: острое заболевание с кашлем, мокротой, температурой, крепитацией и отставанием грудной клетки — типичные для пневмонии. Первое исследование: Рентгенография органов грудной клетки (рентген легких) — основной метод подтверждения пневмонии.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Мужчина, 25 лет, обратилась с жалобами в эпигастрии после приема пищи через 1,5 часа, тошнота. Чаще беспокоит в осенне-весенний период. Самостоятельно принимает омепразол на фоне которого боли уменьшается. Выберите более информативный метод диагностики?", "a": "Молодой мужчина с симптомами диспепсии и приемом омепразола, боль связана с приемом пищи. Наиболее информативный метод диагностики: Эзофагогастродуоденоскопия (ЭГДС) — позволяет оценить слизистую желудка и двенадцатиперстной кишки, выявить язвы и эрозии.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Пациентка обратился с жалобами на боли в эпигастрии после приема пищи через час. На ЭГДС: данные за эрозивный гастрит. Выберите не инвазивный метод диагностики для выявления хеликобактер пилори?", "a": "Женщина с эрозивным гастритом по данным ЭГДС. Нужно выявить Helicobacter pylori. Неинвазивный метод: дыхательный уреазный тест (C13 или C14 уреазный тест) — самый информативный и широко применяемый, или анализ кала на антиген H.pylori.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Пациентку начали беспокоит желтушность кожных покровов и боли в правом подреберье после применения алкоголя. При физикальном обследовании отмечается: гепатомегалия. Лабораторно: АСТ-120 ед/л, АЛТ-130 ед/л, общий билирубин-56 ммоль/л, прямой-35 ммоль/л, не прямой-21 ммоль/л. Выберите о каком синдроме можно предположить?", "a": "Женщина с желтухой после алкоголя, гепатомегалией, повышение АСТ, АЛТ, прямой билирубин. Это признаки алкогольного гепатита с внутрипеченочной холестазой. Синдром: паренхиматозная желтуха с цитолитическим синдромом и холестазом.", "level": "ПРИМЕНЕНИЕ"}, {"q": "Больной, 57 лет, через 6 часов после начала серии приступов интенсивных сжимающих болей в груди, сопровождавшихся сердцебиением и потерей сознания. Объективно: состояние тяжелое. Кожные покровы бледные, повышенной влажности. В легких дыхание везикулярное, в нижних отделах выслушиваются незвонкие влажные мелкопузырчатые хрипы. ЧД – 18/мин. Тоны сердца глухие, ритм правильный. ЧСС – 18/мин. АД – 190/100 мм рт. ст. Живот мягкий, безболезненный при пальпации, печень не выступает из-под реберной дуги. Выберите, какой метод диагностики необходимо использовать в первую очередь для уточнения диагноза?", "a": "Пациент 57 лет с тяжелым состоянием после приступов болей в груди, бледен, влажная кожа, хрипы в легких — признаки острой сердечной недостаточности и, вероятно, осложненного ИМ. Метод диагностики: Электрокардиография (ЭКГ) — для диагностики инфаркта миокарда, аритмий, ишемии, а также эхокардиография (ЭхоКГ) для оценки функции сердца и осложнение.", "level": "ПРИМЕНЕНИЕ"}];
let st={pool:[],i:0,know:0,title:'',flipped:false};
let again=[];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function byLevel(){const m={};CARDS.forEach((c,idx)=>{c._id=idx;(m[c.level]=m[c.level]||[]).push(c);});return m;}

function goHome(){
  const m=byLevel();
  const order=['ЗАПОМИНАНИЕ','ПОНИМАНИЕ','ПРИМЕНЕНИЕ'].filter(l=>m[l]);
  let h=`<h1>Клиническая медицина</h1>
  <div class="sub">${CARDS.length} карточек. Читаешь вопрос → вспоминаешь → открываешь ответ → честно жмёшь «Знаю» или «Повторить». В конце прогоняешь только то, что отметила на повтор.</div>
  <button class="bigbtn" onclick="start(shuffle(CARDS),'Все карточки')">▶ Все карточки (вперемешку)</button>
  <button class="bigbtn alt" onclick="start(CARDS.slice(),'Все по порядку')">↓ По порядку</button>
  <div class="sub" style="margin-top:22px">По уровням сложности:</div>`;
  order.forEach(l=>{
    h+=`<button class="lvlbtn" onclick="start(shuffle(byLevel()['${l}']),'${l}')">
      <span>${l[0]+l.slice(1).toLowerCase()}</span><span class="cnt">${m[l].length}</span></button>`;
  });
  document.getElementById('app').innerHTML=h;
}
function start(pool,title){st={pool,i:0,know:0,title,flipped:false};again=[];render();}

function render(){
  const {pool,i}=st;
  if(i>=pool.length) return done();
  const c=pool[i];
  const prog=Math.round(i/pool.length*100);
  let h=`<div class="meta"><span class="pill">${st.title}</span><span>${i+1} / ${pool.length} · ✓ ${st.know}</span></div>
  <div class="bar"><i style="width:${prog}%"></i></div>
  <div class="flash"><div class="tag">${c.level[0]+c.level.slice(1).toLowerCase()}</div>
  <div class="qtext">${esc(c.q)}</div>`;
  if(!st.flipped){
    h+=`<div class="hint">вспомни ответ про себя</div>
    <button class="reveal" onclick="flip()">Показать ответ</button>`;
  }else{
    h+=`<div class="divider"></div><div class="alabel">Ответ</div>
    <div class="atext">${esc(c.a)}</div>
    <div class="rate">
      <button class="again" onclick="rate(false)">↻ Повторить</button>
      <button class="know" onclick="rate(true)">✓ Знаю</button>
    </div>`;
  }
  h+=`</div>`;
  document.getElementById('app').innerHTML=h;
  window.scrollTo(0,0);
}
function flip(){st.flipped=true;render();}
function rate(known){
  const c=st.pool[st.i];
  if(known) st.know++; else again.push(c);
  st.i++; st.flipped=false; render();
}
function done(){
  const tot=st.pool.length, k=st.know, pct=Math.round(k/tot*100);
  let h=`<h1>Готово</h1><div class="score">${pct}%</div>
  <div class="scsub">${k} из ${tot} отмечено «знаю»</div>`;
  if(again.length){
    h+=`<button class="bigbtn" onclick="start(shuffle(window._again),'Повтор (${again.length})')">↻ Прогнать «повторить» (${again.length})</button>`;
    window._again=again.slice();
  }else{
    h+=`<div class="scsub" style="color:var(--know)">Всё на «знаю» 🎉</div>`;
  }
  h+=`<button class="bigbtn alt" onclick="goHome()">← В меню</button>`;
  document.getElementById('app').innerHTML=h;
  window.scrollTo(0,0);
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
goHome();
</script></body></html>
